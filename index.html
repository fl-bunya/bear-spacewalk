                const armGeoL = new THREE.CapsuleGeometry(0.11, 0.14, 8, 16);
                armGeoL.translate(0, 0.07, 0);
                const armL = part(armGeoL, matBody, -0.42, -0.12, 0.05, {
                    rot: [0, 0, 0.9],
                });
                const armGeoR = new THREE.CapsuleGeometry(0.11, 0.14, 8, 16);
                armGeoR.translate(0, 0.07, 0);
                const armR = part(armGeoR, matBody, 0.44, -0.16, 0.05, {
                    rot: [0, 0, -0.7],
                });
                // 脚：胴の裾から覗く小さなカプセル
                const legGeoL = new THREE.CapsuleGeometry(0.13, 0.1, 8, 16);
                legGeoL.translate(0, -0.05, 0);
                const legL = part(legGeoL, matBody, -0.22, -0.72, 0.05, {
                    rot: [0.25, 0, 0.15],
                });
                const legGeoR = new THREE.CapsuleGeometry(0.13, 0.1, 8, 16);
                legGeoR.translate(0, -0.05, 0);
                const legR = part(legGeoR, matBody, 0.22, -0.72, 0.05, {
                    rot: [0.25, 0, -0.15],
                });
                // しっぽ：お尻に丸く
                part(new THREE.SphereGeometry(0.11, 24, 24), matBody, 0, -0.55, -0.36);

                // 装備：ヘルメットは頭だけを包み、リムが首元（頭と胴の境目）から始まる。
                // リングはその境目に密着させ「肩に乗るヘルメットの襟」に見せる
                addGear(group, part, {
                    ringRadius: 0.36,
                    ringY: 0.1,
                    // 頭頂を平らにした分だけ頭が低くなったため、ヘルメットが浮きすぎないよう追従
                    helmetRadius: 0.52,
                    helmetY: 0.4,
                });
                applyOutlines();

                return {
                    group,
                    armL,
                    armR,
                    legL,
                    legR,
                    updateFace() {}, // まばたきなし：原画の表情を固定
                };
            }

            // ====== キャラ選択：?char=mspn で新キャラ、それ以外（既定）は熊 ======
            const charName = new URLSearchParams(location.search).get("char");
            const character = charName === "mspn" ? buildMspn() : buildBear();
            const bear = character.group; // 配置・回転コード（既存）はこの名前で参照
            const { armL, armR, legL, legR } = character;

            // ====== カメラリグ：地球を見回す遊覧カメラ + カメラに同伴する黄色い熊 ======
            // 熊はカメラの子にして常に画面内を漂わせる。カメラがどこを向いても一緒に遊泳する
            scene.add(camera);
            camera.add(bear);
            bear.position.set(...CONFIG.bearOffset);
            bear.scale.setScalar(CONFIG.bearScale); // カメラ空間では無回転で顔がこちらを向く
            // 熊専用のフィルライト：夜側や逆光でも熊が見えるようカメラに同伴させる
            // （地球はカスタムシェーダーでシーンライトを受けないため、熊と装備だけに効く）
            const bearFill = new THREE.PointLight(0xfff0e0, 0.3, 6, 1.5);
            bearFill.position.set(0.15, 0.4, -0.35);
            camera.add(bearFill);
            const earthPosV = new THREE.Vector3(...CONFIG.earthPos);
            const camTargetWorld = new THREE.Vector3();
            const tmpDir = new THREE.Vector3();
            const tmpRight = new THREE.Vector3();
            const tmpUp = new THREE.Vector3();

            // ====== 音声解析 ======
            const audioEl = document.getElementById("bgm");
            audioEl.src = CONFIG.audioFile;

            // ====== プレイリスト（music/ の曲をファイル名順に連続再生） ======
            // 取得の優先順:
            //   1. music/playlist.json（静的ホスティング用。generate-playlist.js で生成）
            //   2. ディレクトリ一覧の解析（ローカルの http-server / python http.server 用）
            //   3. CONFIG.audioFile の単曲ループ（file:// 直開き等の最終フォールバック）
            const AUDIO_EXT = /\.(mp3|m4a|ogg|wav|flac)$/i;
            let playlist = [];
            let trackIndex = -1; // フォールバック曲の再生中は -1（ended で 0 曲目から始まる）
            const trackUrl = (name) => "./music/" + encodeURIComponent(name);
            async function fetchPlaylist() {
                try {
                    const res = await fetch("./music/playlist.json");
                    if (res.ok) {
                        const list = await res.json();
                        if (Array.isArray(list) && list.length) return list;
                    }
                } catch (e) {}
                try {
                    const res = await fetch("./music/");
                    if (res.ok) {
                        const doc = new DOMParser().parseFromString(
                            await res.text(),
                            "text/html",
                        );
                        const files = [...doc.querySelectorAll("a")]
                            .map((a) =>
                                decodeURIComponent(
                                    (a.getAttribute("href") || "")
                                        .split("/")
                                        .pop(),
                                ),
                            )
                            .filter((f) => AUDIO_EXT.test(f))
                            .sort();
                        if (files.length) return files;
                    }
                } catch (e) {}
                return [];
            }
            function playTrack(i) {
                trackIndex =
                    ((i % playlist.length) + playlist.length) % playlist.length;
                audioEl.src = trackUrl(playlist[trackIndex]);
                setNowPlaying(playlist[trackIndex]);
                audioEl.play().catch(() => {});
            }
            fetchPlaylist().then((list) => {
                if (!list.length) return;
                playlist = list;
                // クリック前なら1曲目に差し替える（再生開始後なら曲の終わりから合流）
                if (audioEl.paused && !currentObjectURL) {
                    trackIndex = 0;
                    audioEl.src = trackUrl(playlist[0]);
                    setNowPlaying(playlist[0]);
                }
                if (playlist.length > 1) {
                    document.getElementById("prevTrack").style.display =
                        "inline-block";
                    document.getElementById("nextTrack").style.display =
                        "inline-block";
                }
            });
            // 前の曲・次の曲。D&Dの差し替え曲の再生中に押した場合はプレイリストに戻る
            function stepTrack(dir) {
                if (!playlist.length) return;
                if (currentObjectURL) {
                    URL.revokeObjectURL(currentObjectURL);
                    currentObjectURL = null;
                }
                playTrack(trackIndex + dir);
            }
            document
                .getElementById("prevTrack")
                .addEventListener("click", () => stepTrack(-1));
            document
                .getElementById("nextTrack")
                .addEventListener("click", () => stepTrack(1));
            // 曲が終わったら次へ。D&Dの差し替え曲と単曲フォールバックは従来どおりループ
            audioEl.addEventListener("ended", () => {
                if (playlist.length && !currentObjectURL) {
                    playTrack(trackIndex + 1);
                } else {
                    audioEl.play().catch(() => {});
                }
            });

            const overlay = document.getElementById("overlay");
            let analyser = null;
            let freqData = null;
            let fakeMode = isPreview; // 解析不能時は疑似変調にフォールバック
            let silentFrames = 0;
            const bands = { bass: 0, mid: 0, treble: 0, level: 0 };
            // ビート（低音オンセット）検出の状態。hit=このフレームで拍、env=減衰エンベロープ、strength=拍の強さ
            const beat = { hit: false, strength: 0, env: 0 };
            let bassAvg = 0,
                lastBeatAt = -1;

            // 音声グラフ（AudioContext＋解析）は要素につき1回だけ生成する。
            // createMediaElementSource は再呼び出し不可なので、曲の差し替え時は src 変更＋再生のみ。
            let audioCtx = null,
                audioStarted = false;
            function ensureAudioGraph() {
                if (audioStarted) return;
                audioStarted = true;
                const Ctx = window.AudioContext || window.webkitAudioContext;
                try {
                    audioCtx = new Ctx();
                    const src = audioCtx.createMediaElementSource(audioEl);
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 2048;
                    analyser.smoothingTimeConstant = 0.82;
                    src.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    freqData = new Uint8Array(analyser.frequencyBinCount);
                } catch (e) {
                    fakeMode = true; // Web Audio が使えなくても鑑賞は続行
                }
            }
            // 画面スリープ抑止（Wake Lock）：再生開始後、タブが表示されている間は消灯させない
            let wakeLock = null;
            let wakeLockWanted = false;
            async function keepAwake() {
                if (!("wakeLock" in navigator)) return; // 非対応ブラウザでは何もしない
                try {
                    wakeLock = await navigator.wakeLock.request("screen");
                } catch (e) {
                    /* 省電力モード中などは取得に失敗する */
                }
            }
            document.addEventListener("visibilitychange", () => {
                // バックグラウンドに回るとロックは自動解放されるため、復帰時に再取得
                if (wakeLockWanted && document.visibilityState === "visible")
                    keepAwake();
            });

            function startAudio() {
                ensureAudioGraph();
                if (audioCtx) audioCtx.resume();
                audioEl.play().catch(() => {
                    fakeMode = true;
                });
                wakeLockWanted = true;
                keepAwake();
            }

            // 音量スライダー（控えめ表示・再生開始後に出現・設定はlocalStorageに記憶）
            const volWrap = document.getElementById("volume");
            const volSlider = document.getElementById("vol");
            let savedVol = 0.8;
            try {
                const s = parseFloat(
                    localStorage.getItem("bear-spacewalk-vol"),
                );
                if (!isNaN(s)) savedVol = Math.min(1, Math.max(0, s));
            } catch (e) {
                /* localStorage が使えない環境では既定値 */
            }
            audioEl.volume = savedVol;
            volSlider.value = savedVol;
            volSlider.addEventListener("input", () => {
                audioEl.volume = parseFloat(volSlider.value);
                try {
                    localStorage.setItem("bear-spacewalk-vol", volSlider.value);
                } catch (e) {}
            });

            // BGM 差し替え（File API）：選択／ドロップした音声を読み込み、その場で差し替える
            const musicWrap = document.getElementById("music");
            const musicInput = document.getElementById("musicFile");
            const nowPlaying = document.getElementById("trackname");
            function setNowPlaying(name) {
                // 表示用に拡張子（.mp3 等）は落とす
                const label = name ? name.replace(/\.[^.]+$/, "") : "";
                nowPlaying.textContent = label ? "♪ " + label : "";
                // ブラウザのタブにも再生中の曲名を出す
                document.title = label ? "♪ " + label : "Bear Spacewalk";
            }
            setNowPlaying(CONFIG.audioFile.split("/").pop()); // 初期は既定曲のファイル名
            let currentObjectURL = null;
            function loadAudioFile(file) {
                if (!file || !/^audio\//.test(file.type)) return; // 音声以外は無視
                if (currentObjectURL) URL.revokeObjectURL(currentObjectURL); // 前の曲のURLを解放
                currentObjectURL = URL.createObjectURL(file);
                audioEl.src = currentObjectURL;
                fakeMode = false;
                silentFrames = 0; // 解析を再開
                setNowPlaying(file.name); // 右下にファイル名を表示
                overlay.classList.add("hidden");
                volWrap.classList.add("show");
                musicWrap.classList.add("show");
                startAudio(); // グラフは初回のみ生成、以降は再生のみ
            }
            musicInput.addEventListener("change", () => {
                loadAudioFile(musicInput.files[0]);
                musicInput.value = "";
            });
            // ページ全体へのドラッグ＆ドロップ
            window.addEventListener("dragover", (e) => {
                e.preventDefault();
                document.body.classList.add("dropping");
            });
            window.addEventListener("dragleave", (e) => {
                if (!e.relatedTarget)
                    document.body.classList.remove("dropping");
            });
            window.addEventListener("drop", (e) => {
                e.preventDefault();
                document.body.classList.remove("dropping");
                const f =
                    e.dataTransfer &&
                    e.dataTransfer.files &&
                    e.dataTransfer.files[0];
                if (f) loadAudioFile(f);
            });

            overlay.addEventListener(
                "click",
                () => {
                    overlay.classList.add("hidden");
                    volWrap.classList.add("show");
                    musicWrap.classList.add("show");
                    startAudio();
                },
                { once: true },
            );
            if (isPreview) {
                overlay.classList.add("hidden");
                volWrap.classList.add("show"); // 撮影確認用に表示
                musicWrap.classList.add("show");
            }

            // bin 幅 ≈ 21.5Hz（44.1kHz / 2048）: bass≈40-260Hz, mid≈260-2k, treble≈2k-8k
            function avgRange(lo, hi) {
                let s = 0;
                for (let i = lo; i < hi; i++) s += freqData[i];
                return s / ((hi - lo) * 255);
            }

            function updateBands(t) {
                let target = { bass: 0, mid: 0, treble: 0, level: 0 };
                if (analyser && !fakeMode) {
                    analyser.getByteFrequencyData(freqData);
                    target.bass = avgRange(2, 12);
                    target.mid = avgRange(12, 93);
                    target.treble = avgRange(93, 372);
                    target.level =
                        (target.bass + target.mid + target.treble) / 3;
                    // file:// 等で解析がゼロを返し続ける環境を検知してフォールバック
                    if (!audioEl.paused && target.level === 0) {
                        if (++silentFrames > 180) fakeMode = true;
                    } else {
                        silentFrames = 0;
                    }
                }
                if (fakeMode) {
                    target.bass =
                        0.3 +
                        0.22 * Math.sin(t * 1.9) +
                        0.08 * Math.sin(t * 4.7);
                    target.mid = 0.35 + 0.25 * Math.sin(t * 0.23);
                    target.treble = 0.25 + 0.18 * Math.sin(t * 3.1 + 1.0);
                    target.level = 0.3;
                }
                // ビート検出：平滑化前の瞬時 bass が遅い平均を上回った瞬間を拍とみなす（不応期つき）
                const inst = target.bass;
                bassAvg += (inst - bassAvg) * 0.05;
                beat.hit = false;
                if (
                    inst > bassAvg * 1.4 &&
                    inst > 0.18 &&
                    t - lastBeatAt > 0.18
                ) {
                    beat.hit = true;
                    beat.strength = Math.min(1, (inst - bassAvg) * 2.5);
                    beat.env = Math.max(beat.env, beat.strength);
                    lastBeatAt = t;
                }
                beat.env *= 0.9; // 視覚演出用の減衰エンベロープ
                // 急峻な変化をなめらかに
                const k = 0.12;
                bands.bass += (target.bass - bands.bass) * k;
                bands.mid += (target.mid - bands.mid) * k * 0.4; // 色相はよりゆっくり
                bands.treble += (target.treble - bands.treble) * k;
                bands.level += (target.level - bands.level) * k;
            }

            // ====== 後処理シェーダー（ゴッドレイ / Bloom / 合成） ======
            // ゴッドレイ：occRT を太陽の画面位置から放射状にブラー（volumetric light scattering）
            const godMat = new THREE.ShaderMaterial({
                depthTest: false,
                depthWrite: false,
                uniforms: {
                    tDiffuse: { value: null },
                    uLightPos: { value: new THREE.Vector2(0.5, 0.5) },
                    uExposure: { value: 0.3 },
                    uDecay: { value: 0.96 },
                    uDensity: { value: 0.95 },
                    uWeight: { value: 0.55 },
                    uStrength: { value: 1.0 },
                },
                vertexShader: FS_VERT,
                fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uLightPos;
    uniform float uExposure, uDecay, uDensity, uWeight, uStrength;
    varying vec2 vUv;
    const int SAMPLES = 60;
    void main(){
      vec2 dir = (vUv - uLightPos) * uDensity / float(SAMPLES);
      vec2 coord = vUv;
      float illum = 1.0;
      vec3 col = vec3(0.0);
      for (int i = 0; i < SAMPLES; i++) {
        coord -= dir;
        vec3 s = texture2D(tDiffuse, coord).rgb * illum * uWeight;
        col += s;
        illum *= uDecay;
      }
      gl_FragColor = vec4(col * uExposure * uStrength, 1.0);
    }`,
            });

            // Bloom 明部抽出
            const brightMat = new THREE.ShaderMaterial({
                depthTest: false,
                depthWrite: false,
                uniforms: {
                    tDiffuse: { value: null },
                    uThreshold: { value: 0.85 },
                },
                vertexShader: FS_VERT,
                fragmentShader: `
    uniform sampler2D tDiffuse; uniform float uThreshold;
    varying vec2 vUv;
    void main(){
      vec3 c = texture2D(tDiffuse, vUv).rgb;
      float l = dot(c, vec3(0.2126, 0.7152, 0.0722));
      float k = smoothstep(uThreshold, uThreshold + 0.35, l);
      gl_FragColor = vec4(c * k, 1.0);
    }`,
            });

            // 分離ガウシアンぼかし
            const blurMat = new THREE.ShaderMaterial({
                depthTest: false,
                depthWrite: false,
                uniforms: {
                    tDiffuse: { value: null },
                    uOffset: { value: new THREE.Vector2() },
                },
                vertexShader: FS_VERT,
                fragmentShader: `
    uniform sampler2D tDiffuse; uniform vec2 uOffset;
    varying vec2 vUv;
    void main(){
      vec4 sum = vec4(0.0);
      sum += texture2D(tDiffuse, vUv - 4.0*uOffset) * 0.05;
      sum += texture2D(tDiffuse, vUv - 3.0*uOffset) * 0.09;
      sum += texture2D(tDiffuse, vUv - 2.0*uOffset) * 0.12;
      sum += texture2D(tDiffuse, vUv - 1.0*uOffset) * 0.15;
      sum += texture2D(tDiffuse, vUv)               * 0.18;
      sum += texture2D(tDiffuse, vUv + 1.0*uOffset) * 0.15;
      sum += texture2D(tDiffuse, vUv + 2.0*uOffset) * 0.12;
      sum += texture2D(tDiffuse, vUv + 3.0*uOffset) * 0.09;
      sum += texture2D(tDiffuse, vUv + 4.0*uOffset) * 0.05;
      gl_FragColor = sum;
    }`,
            });

            // 最終合成：本シーン＋Bloom＋ハレーション＋ゴッドレイ → トーンマップ
            const compMat = new THREE.ShaderMaterial({
                depthTest: false,
                depthWrite: false,
                uniforms: {
                    tScene: { value: null },
                    tGlow: { value: null },
                    tGod: { value: null },
                    uBloom: { value: 0.32 },
                    uHalation: { value: 0.2 },
                    uHalColor: { value: new THREE.Color(1.0, 0.55, 0.25) },
                },
                vertexShader: FS_VERT,
                fragmentShader: `
    uniform sampler2D tScene, tGlow, tGod;
    uniform float uBloom, uHalation;
    uniform vec3 uHalColor;
    varying vec2 vUv;
    // 画面座標ベースの擬似乱数（最終8bit出力の縞を散らすディザ用）
    float dither(vec2 p){ return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
    void main(){
      vec3 scene = texture2D(tScene, vUv).rgb;
      vec3 glow  = texture2D(tGlow, vUv).rgb;
      vec3 god   = texture2D(tGod, vUv).rgb;
      float gi = dot(glow, vec3(0.2126, 0.7152, 0.0722));
      vec3 col = scene + glow * uBloom + uHalColor * gi * uHalation + god;
      col = col / (1.0 + max(col - vec3(1.0), vec3(0.0)));
      // ±0.5/255 のディザでバンディングをノイズに分散（8bit画面出力対策）
      col += (dither(gl_FragCoord.xy) - 0.5) / 255.0;
      gl_FragColor = vec4(col, 1.0);
    }`,
            });

            // 太陽の画面座標（occRT/godMat 用の uv）と可視判定
            const godStrength = 1.0;
            const _sp = new THREE.Vector3();
            function sunScreen() {
                _sp.copy(sunGroup.position).project(camera);
                // 画面外に出ても即カットせず、太陽円盤が完全に外れるあたり（NDC1.6）まで滑らかに減衰
                const edge = Math.max(Math.abs(_sp.x), Math.abs(_sp.y));
                const fade =
                    _sp.z < 1.0
                        ? 1 - THREE.MathUtils.smoothstep(edge, 1.15, 1.6)
                        : 0;
                return {
                    x: _sp.x * 0.5 + 0.5,
                    y: _sp.y * 0.5 + 0.5,
                    fade,
                };
            }

            // カメラが地球の夜側半球の上空にいる度合い（0=昼側, 1=夜側）。
            // camera→地球中心 の方向と太陽方向の内積で判定（dot>0:昼半球上空, dot<0:夜半球上空）。
            // 天の川はこの夜側度に応じて表示する。
            const _camDir = new THREE.Vector3();
            function cameraNightness() {
                _camDir.copy(camera.position).sub(earthPosV).normalize();
                // dot>0:昼半球上空 / dot<0:夜半球上空。smoothstep(min<max)で昼側=1を作り反転して夜側=1に
                return (
                    1 -
                    THREE.MathUtils.smoothstep(_camDir.dot(sunDir), -0.25, 0.05)
                );
            }

            // 遮蔽バッファ：太陽=白・地球=黒を本カメラで occRT へ（深度で太陽が欠ける＝日食）
            function renderOcclusion() {
                occEarth.position.copy(earth.position);
                occEarth.quaternion.copy(earth.quaternion);
                occSun.position.copy(sunGroup.position);
                occSun.quaternion.copy(sunGroup.quaternion);
                renderer.setRenderTarget(occRT);
                renderer.render(occScene, camera);
            }

            // 後処理パイプライン本体
            let milkyVis = 0; // 天の川の表示度（夜側半球で 1 へ、昼側で 0 へフェード）
            let zodiacVis = 0; // 昼の光の帯の表示度（昼側で 1 へ）
            let cometVis = 0; // 彗星の表示度（出現後 1 へ）
            let cometBorn = false; // 一度出現したらセッション中ずっといる
            const _cometFwd = new THREE.Vector3();
            const _cometRight = new THREE.Vector3();
            const _cometV = new THREE.Vector3();
            const _cometUp = new THREE.Vector3(0, 1, 0);
            function renderPost() {
                // カメラが地球の夜側半球に入ったら天の川を浮かび上がらせる（ゆっくりフェード）
                milkyVis += (cameraNightness() - milkyVis) * 0.12;
                milkyMat.uniforms.uVisible.value = forceMilky ? 1 : milkyVis;
                // 昼側では“光の帯”を浮かび上がらせる（天の川と昼夜クロスフェード）
                zodiacVis += (1 - cameraNightness() - zodiacVis) * 0.12;
                zodiacMat.uniforms.uVisible.value = forceZodiac ? 1 : zodiacVis;

                // 彗星の初回出現：太陽・月が画面外で天の川も見えない瞬間が来たら、
                // そのときの視界の左寄り・やや下に位置を決めて現れる（実時刻の太陽・月・
                // 昼夜に依存するため毎回変わる）。一度現れたら、以降は太陽や月が視界に
                // 戻ってきても消えずに共存し、星空と一緒に流れ続ける
                if (!forceComet) {
                    if (!cometBorn) {
                        camera.getWorldDirection(_cometFwd);
                        const cHHalf = Math.atan(
                            Math.tan(
                                THREE.MathUtils.degToRad(camera.fov) * 0.5,
                            ) * camera.aspect,
                        );
                        _cometV
                            .copy(moon.position)
                            .sub(camera.position)
                            .normalize();
                        const moonIn =
                            _cometV.dot(_cometFwd) > Math.cos(cHHalf + 0.15);
                        if (
                            sunScreen().fade <= 0 &&
                            !moonIn &&
                            milkyVis < 0.25
                        ) {
                            _cometRight
                                .crossVectors(_cometFwd, camera.up)
                                .normalize();
                            _cometV
                                .copy(_cometFwd)
                                .applyAxisAngle(_cometRight, -0.06) // 画面のやや下へ
                                .applyAxisAngle(_cometUp, cHHalf * 0.35) // 画面左寄りへ
                                .multiplyScalar(135) // 星殻(115-165)内・天の川球(150)の手前
                                .add(camera.position)
                                .applyAxisAngle(_cometUp, -milky.rotation.y); // 親（回る空）のローカル座標へ
                            comet.position.copy(_cometV);
                            cometBorn = true;
                        }
                    } else if (cometVis < 1) {
                        cometVis += (1 - cometVis) * 0.02; // 出現時だけ短くフェードイン
                        cometMat.opacity = cometVis;
                    }
                }

                renderer.setRenderTarget(sceneRT);
                renderer.render(scene, camera);

                renderOcclusion();

                const sp = sunScreen();
                godMat.uniforms.tDiffuse.value = occRT.texture;
                godMat.uniforms.uLightPos.value.set(sp.x, sp.y);
                godMat.uniforms.uStrength.value = godStrength * sp.fade;
                blit(godMat, godRT);

                brightMat.uniforms.tDiffuse.value = sceneRT.texture;
                blit(brightMat, brightRT);

                let src = brightRT;
                for (let i = 0; i < 5; i++) {
                    const r = i + 1;
                    blurMat.uniforms.tDiffuse.value = src.texture;
                    blurMat.uniforms.uOffset.value.set(r / hW, 0);
                    blit(blurMat, blurA);
                    blurMat.uniforms.tDiffuse.value = blurA.texture;
                    blurMat.uniforms.uOffset.value.set(0, r / hH);
                    blit(blurMat, blurB);
                    src = blurB;
                }

                compMat.uniforms.tScene.value = sceneRT.texture;
                compMat.uniforms.tGlow.value = blurB.texture;
                compMat.uniforms.tGod.value = godRT.texture;
                blit(compMat, null);
                renderer.setRenderTarget(null);
            }

            // ====== メインループ ======
            const clock = new THREE.Clock();
            // ?t0=秒 でアニメ時刻を先送りして開始（遊覧パスの後半の構図確認用）
            const t0Match = location.search.match(/t0=([\d.]+)/);
            let t = t0Match ? parseFloat(t0Match[1]) : 0;

            // 瞬き・手足バタバタの状態（撮影確認用に &blink / &flail で強制可能）
            const forceBlink = location.search.indexOf("blink") !== -1;
            const forceFlail = location.search.indexOf("flail") !== -1;
            const forceMilky = location.search.indexOf("milky") !== -1; // 確認用：天の川を常時表示
            const forceZodiac = location.search.indexOf("zodiac") !== -1; // 確認用：昼の光の帯を常時表示
            const forceDay = location.search.indexOf("forceday") !== -1; // 確認用：昼構図を強制（太陽をカメラ側へ）
            let flailStart = -10;
            let flailDur = 1;
            let nextFlailAt = 6;
            // カメラ遊覧リグ（位置＋視線）を関数化：毎フレームのループと「起動時の月初期角」計算で共有する。
            const _rigFwd = new THREE.Vector3(); // 直近フレームの視線方向（単位ベクトル）
            function updateCameraRig(camT) {
                // 地球を見回す遊覧パス（方位・仰角・距離が別周期でゆっくり揺らぐ）
                const az = CONFIG.camAz0 + 0.1 * Math.sin(0.02 * camT);
                const el =
                    0.42 * Math.sin(0.0083 * camT + 1.0) +
                    0.12 * Math.sin(0.023 * camT);
                const rr = 11.2 + 1.8 * Math.sin(0.0067 * camT + 4.0);
                camera.position.set(
                    earthPosV.x + rr * Math.cos(el) * Math.cos(az),
                    earthPosV.y + rr * Math.sin(el),
                    earthPosV.z + rr * Math.cos(el) * Math.sin(az),
                );
                // 視線：地球中心方向から仰角βだけ持ち上げて地平線を画面下に置き、左右γを加える
                tmpDir.copy(earthPosV).sub(camera.position).normalize();
                tmpRight.crossVectors(tmpDir, camera.up).normalize();
                const alpha = Math.asin(CONFIG.earthRadius / rr); // 地球の視半径
                const horizonElev =
                    0.07 + 0.06 * (0.5 + 0.5 * Math.sin(0.009 * camT + 2.0));
                const beta = alpha - horizonElev;
                const gamma = 0.3 * Math.sin(0.013 * camT + 0.7);
                tmpDir.applyAxisAngle(tmpRight, beta); // 中心から地平線方向へ
                tmpUp.crossVectors(tmpRight, tmpDir).normalize();
                tmpDir.applyAxisAngle(tmpUp, gamma); // 左右の見回し
                _rigFwd.copy(tmpDir); // 起動時の月初期角計算で参照
                camTargetWorld
                    .copy(camera.position)
                    .addScaledVector(tmpDir, 10);
                camera.lookAt(camTargetWorld);
                return horizonElev; // 熊の配置(bearElev)で使う
            }

            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.05);
                t += dt;
                updateBands(t);

                // 地球：日本→西へユーラシアを映す俯瞰ツアー。tourSpin の一定速で回す（音による加減速はしない）。
                // プレビューは効果確認用に 5秒で1周（開始構図 t0=0 は実モードと共通）
                const baseSpin = isPreview
                    ? (Math.PI * 2) / 5
                    : ryOverride
                      ? CONFIG.earthSpin
                      : CONFIG.tourSpin;
                earth.rotation.y += dt * baseSpin;
                if (CONFIG.timeSync) updateSunDir(); // 太陽方向は現在時刻に追従（現実の昼夜を維持）
                if (forceDay)
                    sunDir.copy(camera.position).sub(earthPosV).normalize(); // 確認用：昼構図を強制
                earthUniforms.uTime.value = t;
                earthUniforms.uBass.value = bands.bass + beat.env * 0.3;
                earthUniforms.uMid.value = bands.mid;
                earthTexUniforms.uBass.value = bands.bass;
                earthTexUniforms.uMid.value = bands.mid;
                earthTexUniforms.uSunDirView.value
                    .copy(sunDir)
                    .transformDirection(camera.matrixWorldInverse);
                // 雲は本体と独立に流す（時刻同期中は地表が静止に近いので控えめに）
                if (texturedEarth)
                    clouds.rotation.y +=
                        dt *
                        (isPreview
                            ? ((Math.PI * 2) / 5) * 1.12
                            : ryOverride
                              ? CONFIG.earthSpin * 1.4
                              : CONFIG.tourSpin * 1.1);
                atmoUniforms.uBass.value = bands.bass + beat.env * 0.45;
                atmoUniforms.uMid.value = bands.mid;
                earthLight.intensity = 0.55 + bands.bass * 1.6;

                // 太陽：表面のうねりだけ時間で動かす（明るさは音楽に連動させず一定）
                sunCoreMat.uniforms.uTime.value = t;

                // 昼の光の帯・雲churn・月（いずれも音非依存でゆっくり）
                zodiacMat.uniforms.uTime.value = t;
                cloudUniforms.uTime.value = t;
                // 月：太陽と同じ軌道面を earthCenter まわりに公転。太陽光で満ち欠け。
                moonAng += dt * (isPreview ? 0.5 : 0.02); // 公転速度（通常ゆっくり=1周約5分／preview は確認用に高速）
                moonPositionAt(moonAng, moon.position);
                moon.rotation.y += dt * (isPreview ? 0.2 : 0.03); // 自転

                // 星：高音できらめく＋ビートで増幅
                starUniforms.uTime.value = t;
                starUniforms.uTreble.value = bands.treble;
                starUniforms.uBeat.value = beat.env;
                // 星空・天の川を自転に合わせてゆっくり回す（星が固定で動かず死んで見えないように）
                starPoints.rotation.y += dt * baseSpin * 0.6;
                milky.rotation.y += dt * baseSpin * 0.6;

                // ビジュアライザー：ビートで流星をspawn・波紋リングを発生、極オーロラは音で揺らぐ
                if (beat.hit && beat.strength > 0.45 && Math.random() < 0.7)
                    spawnMeteor();
                if (beat.hit) spawnRing(beat.strength);
                // 無音でも一定間隔で流れ星を出す（ビート分に上乗せ）
                ambientMeteorTimer -= dt;
                if (ambientMeteorTimer <= 0) {
                    spawnMeteor(); // ②タイマー分（①ビート分と同じく視界内に出る）
                    ambientMeteorTimer = isPreview
                        ? 0.5 + Math.random() * 0.5 // 撮影確認用：0.5〜1.0秒ごと＝ほぼ常に画面内
                        : 9 + Math.random() * 13; // 通常：9〜22秒に1本
                }
                updateMeteors(dt);
                updateRings();
                updateUFO(t, dt);
                const auroraAudio = Math.min(
                    1,
                    bands.mid * 0.6 + bands.treble * 0.5 + beat.env * 0.5,
                );
                auroraN.uniforms.uTime.value = t;
                auroraN.uniforms.uAudio.value = auroraAudio;
                auroraS.uniforms.uTime.value = t;
                auroraS.uniforms.uAudio.value = auroraAudio;

                // カメラ遊覧パス（位置＋視線）。実装は updateCameraRig（起動時の月初期角計算と共有）。
                const horizonElev = updateCameraRig(t); // 戻り値(地平線仰角)は熊の配置に使う

                // 夜側では太陽が地球に遮られる：熊・装備への直射光を影で滑らかに消す
                tmpRight.copy(camera.position).sub(earthPosV).normalize();
                sun.intensity =
                    0.72 *
                    THREE.MathUtils.smoothstep(
                        tmpRight.dot(sunDir),
                        -0.45,
                        -0.05,
                    );

                // 熊：地平線の少し下＝大地を背景に、地球の手前を一定のゆっくりペースで漂う
                // （音楽連動は宇宙遊泳の静けさを損なうため体の動きには入れない）
                const bearElev = horizonElev - 0.18; // 地平線より下に置き「地球の手前」に見せる
                // x は「熊の奥行きでの水平視野半幅×比率」で毎フレーム算出。ゆらぎ幅も半幅比で
                // スケールさせ、縦長画面・ウインドウリサイズでも常に画面内に収まる
                const bearHalfW =
                    Math.tan(THREE.MathUtils.degToRad(camera.fov) * 0.5) *
                    camera.aspect *
                    Math.abs(CONFIG.bearOffset[2]);
                bear.position.set(
                    bearHalfW * (CONFIG.bearXFrac + Math.sin(t * 0.31) * 0.07),
                    Math.abs(CONFIG.bearOffset[2]) * Math.tan(bearElev) +
                        Math.sin(t * 0.23 + 1.2) * 0.025,
                    CONFIG.bearOffset[2] + Math.sin(t * 0.17 + 2.4) * 0.03,
                );
                bear.rotation.z = Math.sin(t * 0.12) * 0.35 - 0.15;
                bear.rotation.x = Math.sin(t * 0.09 + 0.7) * 0.25;
                if (t < 0.1)
                    bear.rotation.y = -0.6; // スタート時は左に向く
                else bear.rotation.y += dt * 0.08;

                if (isPreview) bear.rotation.set(0, 0, 0); // 撮影確認用に正面固定

                // 瞬き・表情はキャラ側に委譲（熊: 3〜7秒間隔のまばたき / mspn: 固定顔）
                character.updateFace(t, forceBlink);

                // 手足バタバタ：7〜15秒ごとに1.4〜2.2秒、なめらかに始まり収まる
                if (t >= nextFlailAt) {
                    flailStart = t;
                    flailDur = 1.4 + Math.random() * 0.8;
                    nextFlailAt = t + 7 + Math.random() * 8;
                }
                const fp = (t - flailStart) / flailDur;
                const flail = forceFlail
                    ? 1
                    : fp >= 0 && fp <= 1
                      ? Math.sin(Math.PI * fp)
                      : 0;
                const flap = flail * Math.sin(t * 9.0) * 0.5; // 腕：左右同時に羽ばたき
                const kick = flail * Math.sin(t * 8.0 + 1.0) * 0.45; // 脚：交互にバタ足
                armL.rotation.z = 0.9 + flap;
                armR.rotation.z = -0.7 - flap;
                legL.rotation.x = 0.25 + kick;
                legR.rotation.x = 0.25 - kick;

                renderPost();
            }

            // ====== 起動時の月の初期公転角 ======
            // 太陽が画面に入っていないときは、月が視界へ入ってくる位置から開始する。太陽が画面内なら既定角のまま。
            {
                updateCameraRig(t); // 起動時の視線 _rigFwd を確定
                const _v = new THREE.Vector3();
                const _m = new THREE.Vector3();
                const vHalf = THREE.MathUtils.degToRad(camera.fov) * 0.5;
                const hHalf = Math.atan(Math.tan(vHalf) * camera.aspect); // 水平画角の半分
                const sunInView =
                    _v
                        .copy(sunGroup.position)
                        .sub(camera.position)
                        .normalize()
                        .dot(_rigFwd) > Math.cos(hHalf + 0.12); // +余裕（太陽の視半径・グロー分）
                if (!sunInView) {
                    // 月が画面内かつ地球に遮蔽されない公転角のうち、最も中心寄りに見える角を探す。
                    const _e = new THREE.Vector3()
                        .copy(earthCenter)
                        .sub(camera.position); // カメラ→地球中心
                    const earthDist = _e.length();
                    const er = CONFIG.earthRadius;
                    let best = null,
                        bestDot = -2;
                    for (let i = 0; i < 720; i++) {
                        const a = (i / 720) * Math.PI * 2;
                        moonPositionAt(a, _m);
                        _v.copy(_m).sub(camera.position);
                        const md = _v.length();
                        _v.divideScalar(md); // 月方向（単位）
                        const dotFwd = _v.dot(_rigFwd);
                        if (dotFwd < Math.cos(hHalf)) continue; // 画面外
                        // 地球球による遮蔽：手前の月は見える／裏は隠れる
                        const tca = _e.dot(_v);
                        const d2 = earthDist * earthDist - tca * tca;
                        if (tca > 0 && d2 < er * er) {
                            const t0 = tca - Math.sqrt(er * er - d2);
                            if (t0 > 0 && t0 < md) continue; // 地球が手前で遮る
                        }
                        if (dotFwd > bestDot) {
                            bestDot = dotFwd;
                            best = a;
                        }
                    }
                    // 可視角の少し手前から公転で「入ってくる」
                    if (best !== null) moonAng = best - 0.5;
                }
            }
            animate();

            window.addEventListener("resize", () => {
                W = window.innerWidth;
                H = window.innerHeight;
                hW = Math.max(1, W >> 1);
                hH = Math.max(1, H >> 1);
                camera.aspect = W / H;
                camera.fov = fovForAspect(camera.aspect);
                camera.updateProjectionMatrix();
                renderer.setSize(W, H);
                sceneRT.setSize(W, H);
                occRT.setSize(hW, hH);
                godRT.setSize(hW, hH);
                brightRT.setSize(hW, hH);
                blurA.setSize(hW, hH);
                blurB.setSize(hW, hH);
            });
        </script>
    </body>
</html>
