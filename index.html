<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>宇宙でさみしいなあ</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: #02030a;
                height: 100%;
            }
            canvas {
                display: block;
            }
            #overlay {
                position: fixed;
                inset: 0;
                z-index: 10;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: radial-gradient(
                    ellipse at center,
                    rgba(10, 18, 40, 0.85) 0%,
                    rgba(2, 3, 10, 0.95) 70%
                );
                color: #cfe3ff;
                cursor: pointer;
                user-select: none;
                font-family:
                    "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
                transition: opacity 1.2s ease;
            }
            #overlay.hidden {
                opacity: 0;
                pointer-events: none;
            }
            #start {
                width: 88px;
                height: 88px;
                border-radius: 50%;
                border: 1px solid rgba(150, 190, 255, 0.55);
                background: rgba(40, 80, 160, 0.22);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 0 26px rgba(74, 144, 217, 0.35);
                transition:
                    background 0.25s ease,
                    box-shadow 0.25s ease,
                    transform 0.25s ease;
            }
            #start::after {
                content: "";
                width: 0;
                height: 0;
                border-style: solid;
                border-width: 15px 0 15px 25px; /* 右向き三角形 */
                border-color: transparent transparent transparent #dcebff;
                margin-left: 7px; /* 三角形の重心ぶん右へ寄せて光学中央に */
            }
            /* hover装飾はマウス等のホバー可能環境のみ。タッチではタップ後に
               hover状態が貼り付いて色が残るため適用しない（sticky hover対策） */
            @media (hover: hover) {
                #start:hover {
                    background: rgba(70, 120, 210, 0.38);
                    box-shadow: 0 0 42px rgba(96, 165, 250, 0.6);
                    transform: scale(1.08);
                }
            }
            #overlay p {
                font-size: 13px;
                letter-spacing: 0.25em;
                opacity: 0.7;
                animation: pulse 2.4s ease-in-out infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 0.35;
                }
                50% {
                    opacity: 0.85;
                }
            }
            #volume {
                position: fixed;
                left: 14px;
                bottom: 10px;
                z-index: 5;
                display: none;
                align-items: center;
                gap: 7px;
                color: rgba(180, 205, 255, 0.8);
                font-size: 12px;
                opacity: 0.35;
                transition: opacity 0.3s ease;
            }
            #volume.show {
                display: flex;
            }
            @media (hover: hover) {
                #volume:hover {
                    opacity: 0.85;
                }
            }
            #volume input {
                width: 90px;
                height: 3px;
                cursor: pointer;
                accent-color: #5fa8ff;
                background: transparent;
            }
            /* BGM 差し替えUI（右下・さりげないが押せると分かる下線リンク調） */
            #music {
                position: fixed;
                right: 14px;
                bottom: 10px;
                z-index: 5;
                display: none;
                justify-content: flex-end;
                opacity: 0.3;
                transition: opacity 0.3s ease;
            }
            #music.show {
                display: flex;
            }
            @media (hover: hover) {
                #music:hover {
                    opacity: 0.9;
                }
            }
            #music label {
                color: rgba(180, 205, 255, 0.85);
                font-size: 11px;
                cursor: pointer;
                letter-spacing: 0.12em;
                user-select: none;
                border-bottom: 1px solid rgba(150, 185, 255, 0.5);
                padding-bottom: 1px;
                font-family: "Hiragino Kaku Gothic ProN", sans-serif;
            }
            #music input {
                display: none;
            }
            /* 再生中のファイル名（右下・曲を選ぶの上）。両脇の « » で前後の曲へ */
            #nowplaying {
                position: fixed;
                right: 14px;
                bottom: 32px;
                z-index: 5;
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: 10px;
                color: rgba(180, 205, 255, 0.4);
                font:
                    11px/1.4 "Hiragino Kaku Gothic ProN",
                    sans-serif;
                letter-spacing: 0.08em;
                pointer-events: none;
            }
            #nowplaying span {
                pointer-events: auto;
                transition: color 0.2s ease;
                max-width: 42vw;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            #nowplaying button {
                pointer-events: auto;
                background: none;
                border: none;
                padding: 0 2px;
                color: rgba(180, 205, 255, 0.55);
                font-size: 15px;
                line-height: 1;
                cursor: pointer;
                display: none; /* プレイリスト読み込み後に表示 */
                transition: color 0.2s ease;
                transform: translateY(
                    -1px
                ); /* « » は字面が下寄りのため光学中央に補正 */
            }
            @media (hover: hover) {
                #nowplaying button:hover,
                #nowplaying span:hover {
                    color: rgba(215, 235, 255, 0.95);
                }
            }
            #overlay .hint {
                font-size: 11px;
                letter-spacing: 0.12em;
                opacity: 0.45;
                margin-top: 18px;
            }
            body.dropping::after {
                content: "\266a  \3053\3053\306b\66f2\3092\30c9\30ed\30c3\30d7";
                position: fixed;
                inset: 0;
                z-index: 20;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(10, 18, 40, 0.55);
                color: #cfe3ff;
                font:
                    18px/1 "Hiragino Kaku Gothic ProN",
                    sans-serif;
                letter-spacing: 0.2em;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div id="overlay">
            <button id="start" type="button" aria-label="再生"></button>
            <p class="hint">音が出ます</p>
        </div>
        <div id="nowplaying">
            <button
                id="prevTrack"
                type="button"
                aria-label="前の曲"
                title="前の曲"
            >
                «
            </button>
            <span id="trackname"></span>
            <button
                id="nextTrack"
                type="button"
                aria-label="次の曲"
                title="次の曲"
            >
                »
            </button>
        </div>
        <div id="music">
            <label for="musicFile">曲を選ぶ</label
            ><input id="musicFile" type="file" accept="audio/*" />
        </div>
        <div id="volume">
            <span>♪</span
            ><input id="vol" type="range" min="0" max="1" step="0.01" />
        </div>
        <audio id="bgm" preload="auto"></audio>
        <script src="./lib/three.min.js"></script>
        <script>
            "use strict";

            // ====== 調整しやすいように主要パラメータを集約 ======
            const CONFIG = {
                bearColor: 0xf7d452, // 黄色い熊の体色
                shirtColor: 0x1f7fd0, // シャツの青
                earthRadius: 7.0,
                earthPos: [-3.2, -8.6, -1.5],
                bearOffset: [0.42, 0, -1.05], // カメラ至近に置く（最接近時の地表より必ず手前＝地球に隠れない）。x は初期値で、毎フレーム bearXFrac から再計算
                bearXFrac: 0.48, // 熊のx位置＝水平視野半幅に対する割合。画角・アスペクト比が変わっても画面内に収まる
                bearScale: 0.11, // 至近距離でも画面上ではほどよい大きさになる縮小率
                starCount: 5000,
                earthSpin: 0.02, // 自転速度 rad/s（timeSync無効時の演出速度）
                orbitSpeed: 0.02, // 遊覧カメラの基本周回速度 rad/s（1周 ≈ 5分強）
                tourSpin: 0.01, // 俯瞰ツアーの自転速度 rad/s（約10.5分で1周＝日本→欧州120°を約3.5分）
                camAz0: 0.0, // 俯瞰カメラの固定方位（開始時に日本が中央に来るよう調整）
                timeSync: true, // true: 現在時刻の太陽位置に同期（昼夜は現実どおり）
                // 地球は tourSpin でゆっくり自転し、日本→西へユーラシアを映す
                audioFile: "./music/宇宙でさみしいなあ-1.mp3", // プレイリスト取得不可時（file://等）の単曲フォールバック
            };

            const isPreview = location.search.indexOf("preview") !== -1;

            // ====== レンダラ / シーン / カメラ ======
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // ====== ポストプロセッシング基盤（太陽グロー / ゴッドレイ / Bloom 用） ======
            // 本シーンを一旦テクスチャに描き、遮蔽バッファ→放射状ブラー→合成の順で画面に出す。
            // 重い処理は 1/2 解像度（hW×hH）に落として GPU 負荷を抑える。
            let W = window.innerWidth,
                H = window.innerHeight;
            let hW = Math.max(1, W >> 1),
                hH = Math.max(1, H >> 1);
            // HalfFloat（16bit）でグラデーションのバンディング（縞・ドット）を防ぐ
            const rtOpt = {
                minFilter: THREE.LinearFilter,
                magFilter: THREE.LinearFilter,
                format: THREE.RGBAFormat,
                type: THREE.HalfFloatType,
            };
            // sceneRT は MSAA 付き（WebGL2）。後処理でRT経由にすると renderer の antialias が
            // 効かなくなるため、ここで multisample を有効にして輪郭のギザギザを抑える
            const sceneRT = new THREE.WebGLRenderTarget(
                W,
                H,
                Object.assign(
                    { depthBuffer: true, stencilBuffer: false, samples: 4 },
                    rtOpt,
                ),
            );
            const occRT = new THREE.WebGLRenderTarget(
                hW,
                hH,
                Object.assign(
                    { depthBuffer: true, stencilBuffer: false },
                    rtOpt,
                ),
            );
            const godRT = new THREE.WebGLRenderTarget(
                hW,
                hH,
                Object.assign({ depthBuffer: false }, rtOpt),
            );
            const brightRT = new THREE.WebGLRenderTarget(
                hW,
                hH,
                Object.assign({ depthBuffer: false }, rtOpt),
            );
            const blurA = new THREE.WebGLRenderTarget(
                hW,
                hH,
                Object.assign({ depthBuffer: false }, rtOpt),
            );
            const blurB = new THREE.WebGLRenderTarget(
                hW,
                hH,
                Object.assign({ depthBuffer: false }, rtOpt),
            );

            // フルスクリーンquad：後処理シェーダを画面全体に適用する土台
            const fsCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const fsScene = new THREE.Scene();
            const fsQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), null);
            fsScene.add(fsQuad);
            const FS_VERT = `
  varying vec2 vUv;
  void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
`;
            function blit(mat, target) {
                fsQuad.material = mat;
                renderer.setRenderTarget(target);
                renderer.render(fsScene, fsCam);
            }

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x02030a);

            // 縦長画面では垂直fovを広げて水平視野の激減を緩和する（横長は50°のまま）。
            // 水平画角を完全に維持しようとすると縦長で120°超の魚眼になるため、緩やかな補正に留める
            function fovForAspect(aspect) {
                return 50 + Math.max(0, 1 - aspect) * 22;
            }
            const camera = new THREE.PerspectiveCamera(
                fovForAspect(window.innerWidth / window.innerHeight),
                window.innerWidth / window.innerHeight,
                0.1,
                200,
            );
            camera.position.set(0, 0.3, 7.5);

            // ====== ライティング ======
            // 太陽（画面右上奥からの暖色平行光）
            const sun = new THREE.DirectionalLight(0xfff2dd, 0.72);
            sun.position.set(6, 4, 5);
            scene.add(sun);
            const sunDir = sun.position.clone().normalize();

            // 地球からの照り返し（低音で脈動し、熊を照らす）
            const earthLight = new THREE.PointLight(0x5fa8ff, 1.0, 80, 1.6);
            earthLight.position.set(...CONFIG.earthPos);
            scene.add(earthLight);

            scene.add(new THREE.AmbientLight(0x1a2438, 1.0));

            // ====== 星空（高音できらめく Points） ======
            const starGeo = new THREE.BufferGeometry();
            {
                const pos = new Float32Array(CONFIG.starCount * 3);
                const phase = new Float32Array(CONFIG.starCount);
                const size = new Float32Array(CONFIG.starCount);
                for (let i = 0; i < CONFIG.starCount; i++) {
                    // 半径 115〜165 の球殻上に配置（月(カメラから約80)より遠く＝月が常に手前・粒も細かく）
                    const r = 115 + Math.random() * 50;
                    const th = Math.random() * Math.PI * 2;
                    const ph = Math.acos(2 * Math.random() - 1);
                    pos[i * 3] = r * Math.sin(ph) * Math.cos(th);
                    pos[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th);
                    pos[i * 3 + 2] = r * Math.cos(ph);
                    phase[i] = Math.random() * Math.PI * 2;
                    // まだらな大きさ：下限は見える範囲に確保しつつ、細かい〜少し大きいを混ぜる
                    size[i] = 1.0 + Math.pow(Math.random(), 1.6) * 2.2;
                }
                starGeo.setAttribute(
                    "position",
                    new THREE.BufferAttribute(pos, 3),
                );
                starGeo.setAttribute(
                    "aPhase",
                    new THREE.BufferAttribute(phase, 1),
                );
                starGeo.setAttribute(
                    "aSize",
                    new THREE.BufferAttribute(size, 1),
                );
            }
            const starUniforms = {
                uTime: { value: 0 },
                uTreble: { value: 0 },
                uBeat: { value: 0 },
            };
            const starMat = new THREE.ShaderMaterial({
                uniforms: starUniforms,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexShader: `
    attribute float aPhase;
    attribute float aSize;
    uniform float uBeat;
    varying float vPhase;
    void main() {
      vPhase = aPhase;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = aSize * (160.0 / -mv.z) * (1.0 + uBeat * 0.7); // 拍で粒が膨らむ
      gl_Position = projectionMatrix * mv;
    }`,
                fragmentShader: `
    uniform float uTime;
    uniform float uTreble;
    uniform float uBeat;
    varying float vPhase;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      float disk = smoothstep(0.5, 0.05, d);
      float tw = 0.55 + 0.45 * sin(uTime * (1.2 + fract(vPhase) * 1.5) + vPhase * 7.0);
      float amp = mix(0.5, 1.25, clamp(uTreble * 1.6, 0.0, 1.0)) + uBeat * 0.5; // 拍できらめき増（無音でも見えるよう下限UP）
      // 星の色：青白〜白が多数、黄・橙・赤は少数（実際の星の色分布に寄せる）
      float h = fract(vPhase * 2.17 + 0.31);
      vec3 col;
      if (h < 0.55) col = mix(vec3(0.62, 0.74, 1.0), vec3(1.0, 1.0, 1.0), h / 0.55);
      else if (h < 0.80) col = mix(vec3(1.0, 1.0, 1.0), vec3(1.0, 0.88, 0.62), (h - 0.55) / 0.25);
      else if (h < 0.93) col = mix(vec3(1.0, 0.88, 0.62), vec3(1.0, 0.62, 0.30), (h - 0.80) / 0.13);
      else col = mix(vec3(1.0, 0.62, 0.30), vec3(1.0, 0.42, 0.34), (h - 0.93) / 0.07);
      col *= 1.0 + smoothstep(0.78, 1.0, h) * 0.6; // 橙・赤の星をやや明るく目立たせる（赤色巨星のイメージ）
      gl_FragColor = vec4(col, disk * tw * amp);
    }`,
            });
            const starPoints = new THREE.Points(starGeo, starMat);
            scene.add(starPoints);

            // ====== UFO（昼の間、遠方をゆっくり横切る来訪者。円盤＋ドーム＋点滅リムライト。音には非連動） ======
            const ufo = new THREE.Group();
            const ufoLights = [];
            {
                // 円盤ボディ（トゥーン調・金属グレー）
                const body = new THREE.Mesh(
                    new THREE.SphereGeometry(1, 40, 20),
                    new THREE.MeshToonMaterial({ color: 0x9aa6b4 }),
                );
                body.scale.set(1, 0.3, 1);
                ufo.add(body);
                // 下側のお椀（張り出し）
                const hull = new THREE.Mesh(
                    new THREE.SphereGeometry(
                        0.64,
                        32,
                        16,
                        0,
                        Math.PI * 2,
                        Math.PI / 2,
                        Math.PI / 2,
                    ),
                    new THREE.MeshToonMaterial({ color: 0x6b7784 }),
                );
                hull.scale.set(1, 0.5, 1);
                ufo.add(hull);
                // ガラスドーム（発光・半透明）
                const dome = new THREE.Mesh(
                    new THREE.SphereGeometry(
                        0.42,
                        28,
                        16,
                        0,
                        Math.PI * 2,
                        0,
                        Math.PI / 2,
                    ),
                    new THREE.MeshBasicMaterial({
                        color: 0x9fe8ff,
                        transparent: true,
                        opacity: 0.7,
                    }),
                );
                dome.position.y = 0.16;
                ufo.add(dome);
                // 点滅リムライト（色付き・追いかけ点滅）
                const lightColors = [
                    0xff5b6e, 0xffd15b, 0x5bff9d, 0x5bd0ff, 0xd08bff, 0xff5b6e,
                    0xffd15b, 0x5bff9d,
                ];
                for (let i = 0; i < lightColors.length; i++) {
                    const a = (i / lightColors.length) * Math.PI * 2;
                    const mat = new THREE.MeshBasicMaterial({
                        color: lightColors[i],
                    });
                    const bulb = new THREE.Mesh(
                        new THREE.SphereGeometry(0.09, 12, 8),
                        mat,
                    );
                    bulb.position.set(
                        Math.cos(a) * 0.92,
                        -0.02,
                        Math.sin(a) * 0.92,
                    );
                    ufo.add(bulb);
                    ufoLights.push({
                        mat,
                        base: new THREE.Color(lightColors[i]),
                    });
                }
            }
            scene.add(ufo);
            ufo.visible = false; // 既定は非表示（本番では出さない。preview のみ表示）
            const UFO_DIST = 60; // preview で遠方に見せる距離
            const _WORLD_UP = new THREE.Vector3(0, 1, 0);
            const _camFwd = new THREE.Vector3(),
                _camRight = new THREE.Vector3(),
                _camUp = new THREE.Vector3();
            function updateUFOLights(t) {
                for (let i = 0; i < ufoLights.length; i++) {
                    // 追いかけ点滅：位相をずらした鋭いパルス
                    const p =
                        0.5 +
                        0.5 *
                            Math.sin(
                                t * 3.0 - (i / ufoLights.length) * Math.PI * 2,
                            );
                    ufoLights[i].mat.color
                        .copy(ufoLights[i].base)
                        .multiplyScalar(0.25 + 0.75 * p * p * p);
                }
            }
            function updateUFO(t, dt) {
                if (!isPreview) {
                    ufo.visible = false; // 本番では非表示（コミカルなので出さない）
                    return;
                }
                // preview のみ：遠方を左右にゆっくり横切る小さなUFOを表示（確認用）
                updateUFOLights(t);
                ufo.rotation.y += dt * 0.6; // ゆっくり自転（円盤スピン）
                ufo.rotation.z = Math.sin(t * 0.9) * 0.12; // ホバリングの傾き
                ufo.scale.setScalar(1.2); // 小さめ（遠方に見せる）
                ufo.visible = true;
                camera.getWorldDirection(_camFwd);
                _camRight.crossVectors(_camFwd, _WORLD_UP).normalize();
                _camUp.crossVectors(_camRight, _camFwd).normalize();
                ufo.position
                    .copy(camera.position)
                    .addScaledVector(_camFwd, UFO_DIST)
                    .addScaledVector(_camRight, 40 * Math.sin(t * 0.25))
                    .addScaledVector(_camUp, 24 + Math.sin(t * 0.8) * 2);
            }

            // ====== 地球（プロシージャル発光シェーダー） ======
            const earthUniforms = {
                uTime: { value: 0 },
                uBass: { value: 0 },
                uMid: { value: 0 },
                uSunDir: { value: sunDir },
            };
            const NOISE_GLSL = `
  float hash(vec3 p) {
    p = fract(p * 0.3183099 + vec3(0.1, 0.2, 0.3));
    p *= 17.0;
    return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
  }
  float noise(vec3 x) {
    vec3 i = floor(x); vec3 f = fract(x);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(mix(hash(i),                 hash(i+vec3(1,0,0)), f.x),
                   mix(hash(i+vec3(0,1,0)),     hash(i+vec3(1,1,0)), f.x), f.y),
               mix(mix(hash(i+vec3(0,0,1)),     hash(i+vec3(1,0,1)), f.x),
                   mix(hash(i+vec3(0,1,1)),     hash(i+vec3(1,1,1)), f.x), f.y), f.z);
  }
  float fbm(vec3 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 5; i++) { v += a * noise(p); p *= 2.02; a *= 0.5; }
    return v;
  }
  float fbm7(vec3 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 7; i++) { v += a * noise(p); p *= 2.03; a *= 0.5; }
    return v;
  }`;

            // ====== 天の川（背景天球にプロシージャルな銀河帯） ======
            // 星Points(半径40-90)の外側の大きな球の内側に、銀河面に沿った淡い帯・星間雲・
            // 暗黒帯を描く。テクスチャは使わず earthMat 共有の NOISE_GLSL で生成し、additive で
            // 夜空に重ねる（暗部は0加算なので scene.background の暗青がそのまま残る）。
            const milkyMat = new THREE.ShaderMaterial({
                uniforms: { uVisible: { value: 0 } }, // 太陽が隠れているとき 0→1 にフェード
                side: THREE.BackSide,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexShader: `
    varying vec3 vDir;
    void main() {
      vDir = normalize(position);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
                fragmentShader: `
    varying vec3 vDir;
    uniform float uVisible;
    ${NOISE_GLSL}
    // セルごとに星を1点打つ（thr 未満のセルは空。中心ほど明るい点）
    float starLayer(vec3 d, float scale, float thr) {
      vec3 p = d * scale;
      vec3 cell = floor(p);
      vec3 f = fract(p) - 0.5;
      float h = hash(cell);
      if (h < thr) return 0.0;
      float r = length(f);
      float b = fract(h * 91.7);          // 星ごとの明るさのばらつき
      return smoothstep(0.30, 0.0, r) * (0.4 + 0.6 * b);
    }
    void main() {
      vec3 d = normalize(vDir);
      // 銀河面の法線（天球をやや傾けて帯を斜めに通す）
      vec3 N = normalize(vec3(0.36, 0.86, 0.36));
      float dn = dot(d, N);
      // 中心線を fbm でゆらして蛇行させる（ガスを乗せる帯）
      float meander = (fbm(d * 2.0) - 0.5) * 0.22;
      float off = dn + meander;
      float band = exp(-off * off / (2.0 * 0.13 * 0.13)); // 帯（ガスが広がる幅）

      // 星間ガス：ridged noise で筋（フィラメント）構造を作り、のっぺり雲を避ける
      float base  = fbm(d * 3.2);
      float ridge = 1.0 - abs(2.0 * fbm(d * 5.0 + 1.3) - 1.0);
      ridge = pow(clamp(ridge, 0.0, 1.0), 2.2);             // 筋を細く強調
      float fine  = fbm(d * 11.0 + 4.0);
      float gasShape = ridge * (0.35 + 0.9 * base) + fine * 0.15;

      // 暗黒帯（dust lane）：2スケールの網目で星間ダストの分断を作る
      float dust = smoothstep(0.42, 0.80, fbm(d * 7.0 + 5.0));
      dust = max(dust, smoothstep(0.46, 0.82, fbm(d * 13.0 + 9.0)) * 0.7);

      float gas = band * gasShape * (1.0 - dust * 0.88);

      // ガスの色ムラ：青白 ⇄ 赤褐（HII領域）、明るいコアは白寄り
      float hue = fbm(d * 4.0 + 10.0);
      vec3 gasCol = mix(vec3(0.42, 0.54, 0.88), vec3(0.86, 0.46, 0.42),
                        smoothstep(0.45, 0.72, hue));
      gasCol = mix(gasCol, vec3(0.88, 0.84, 0.72), smoothstep(0.62, 0.9, base));

      // 星粒（ガスの中に散らばる。主役はガスに譲る）
      float s = starLayer(d, 190.0, 0.55)
              + starLayer(d, 330.0, 0.62) * 0.85
              + starLayer(d, 560.0, 0.70) * 0.60;
      float dens = band * (1.0 - dust * 0.7);
      vec3 starCol = mix(vec3(0.78, 0.85, 1.0), vec3(1.0, 0.90, 0.74),
                         fract(d.x * 12.3 + d.y * 7.7 + d.z * 5.1));

      vec3 col = gasCol * gas * 0.95       // 星間ガス（主役）
               + starCol * s * dens * 0.7; // 星粒（散らす）
      gl_FragColor = vec4(col * uVisible, 1.0);          // 太陽が隠れているときだけ表示
    }`,
            });
            const milky = new THREE.Mesh(
                new THREE.SphereGeometry(150, 64, 64),
                milkyMat,
            );
            scene.add(milky);

            // ====== 彗星（天の川の帯と逆側＝銀河極寄りの空に置く静かな飾り） ======
            // シアンに輝くコマ＋白紫の尾をCanvasに描き、加算スプライトで天球に貼る。
            // 表示は天の川と同じ夜側フェード（milkyVis）に連動する。
            function makeCometTexture() {
                const cv = document.createElement("canvas");
                cv.width = 512;
                cv.height = 1024;
                const g = cv.getContext("2d");
                g.globalCompositeOperation = "lighter"; // ガス同士が光として足し合わさる
                // 尾の経路：コマ（上）から下へ。降りながら左へ流されるベジェ曲線
                const P0 = [300, 80],
                    P1 = [255, 460],
                    P2 = [140, 960];
                const path = (q) => {
                    const u = 1 - q;
                    return [
                        u * u * P0[0] + 2 * u * q * P1[0] + q * q * P2[0],
                        u * u * P0[1] + 2 * u * q * P1[1] + q * q * P2[1],
                    ];
                };
                const perp = (q) => {
                    // 接線の法線（尾を垂直方向に開かせるため）
                    const u = 1 - q;
                    const dx = 2 * u * (P1[0] - P0[0]) + 2 * q * (P2[0] - P1[0]);
                    const dy = 2 * u * (P1[1] - P0[1]) + 2 * q * (P2[1] - P1[1]);
                    const l = Math.hypot(dx, dy);
                    return [-dy / l, dx / l];
                };
                // 色：頭部シアン白 → 中間ラベンダー → 末端の青紫 へ遷移
                const stops = [
                    [200, 250, 255],
                    [220, 205, 255],
                    [175, 165, 245],
                ];
                const colAt = (q) => {
                    const p = q * (stops.length - 1);
                    const i = Math.min(stops.length - 2, Math.floor(p));
                    const f = p - i;
                    return stops[i].map((c, k) =>
                        Math.round(c + (stops[i + 1][k] - c) * f),
                    );
                };
                const rnd = (() => {
                    // 描画のたびに姿が変わらないよう seed 固定の擬似乱数
                    let s = 1234567;
                    return () => {
                        s = (s * 48271) % 2147483647;
                        return s / 2147483647;
                    };
                })();
                const blob = (x, y, r, rgb, a) => {
                    const grad = g.createRadialGradient(x, y, 0, x, y, r);
                    grad.addColorStop(0, `rgba(${rgb.join(",")},${a})`);
                    grad.addColorStop(1, `rgba(${rgb.join(",")},0)`);
                    g.fillStyle = grad;
                    g.fillRect(x - r, y - r, r * 2, r * 2);
                };
                // 本体のガス：付け根は散らばらず締まった尾を引き、後半（q²で効く）は
                // 散って広く伸びる。広がりは左（法線の正側）へ偏らせて流される感じに
                for (let i = 0; i < 300; i++) {
                    const q = Math.pow(rnd(), 0.75); // 頭寄りをやや濃く
                    const [x, y] = path(q);
                    const [nx, ny] = perp(q);
                    const spread = (3 + 110 * q * q) * (rnd() * 1.7 - 0.5);
                    const r = (8 + 62 * q) * (0.5 + rnd() * 0.5);
                    blob(
                        x + nx * spread + (rnd() - 0.5) * 34 * q,
                        y + ny * spread + (rnd() - 0.5) * 34 * q,
                        r,
                        colAt(q),
                        0.065 * Math.pow(1 - q, 1.15), // 末端は完全にフェードさせ縁を出さない
                    );
                }
                // ファイバー：尾の中を走る細い光の筋。付け根では束のまま、後半で扇状に散る
                for (let f = 0; f < 9; f++) {
                    const o = (f / 8) * 1.6 - 0.4; // -0.4..1.2（扇も左寄りに開く）
                    const phase = rnd() * Math.PI * 2;
                    const rgb = colAt(0.25 + 0.5 * rnd());
                    for (let i = 0; i < 150; i++) {
                        const q = i / 149;
                        const [x, y] = path(q);
                        const [nx, ny] = perp(q);
                        const off =
                            o * 95 * q * q + Math.sin(q * 9 + phase) * 4 * q;
                        blob(
                            x + nx * off,
                            y + ny * off,
                            2.5 + 12 * q,
                            rgb,
                            0.045 * (1 - q),
                        );
                    }
                }
                // コマ：地味な光暈。点光源にせず、尾の方向へ丸く伸びていく
                // ストリーム状の光として描く
                const [hx, hy] = P0;
                blob(hx, hy, 58, [70, 190, 175], 0.16);
                for (let i = 0; i < 30; i++) {
                    const q = i / 105; // コマから尾の付け根 q≈0.28 までゆっくり減衰
                    const [x, y] = path(q);
                    blob(
                        x,
                        y,
                        26 - i * 0.4,
                        [185, 245, 238],
                        0.12 * (1 - i / 32),
                    );
                }
                const tex = new THREE.CanvasTexture(cv);
                tex.encoding = THREE.sRGBEncoding;
                tex.anisotropy = 4;
                return tex;
            }
            const cometMat = new THREE.SpriteMaterial({
                map: makeCometTexture(),
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false,
                opacity: 0, // 「静かな空」のときだけ renderPost がフェードインさせる
            });
            const comet = new THREE.Sprite(cometMat);
            // 位置は固定しない：「静かな空」（太陽・月が画面外で天の川も見えない）が
            // 訪れるたび、そのときの視界に合わせて renderPost 内で決め直す。
            // 実時刻の太陽・月・昼夜に依存するので、出現タイミングも位置も毎回変わる
            // 確認用（?comet)：起動直後の視界中央寄りに固定し、常時表示にする
            const forceComet = location.search.indexOf("comet") !== -1;
            comet.scale.set(34, 68, 1); // 縦長（テクスチャ512×1024と同アスペクト）
            // 星や星雲と同じ遠景なので、天の川球の子にして星空と一緒に回す
            // （確認モードだけは見失わないよう視界に固定＝scene直付け）
            if (forceComet) {
                comet.position
                    .set(-0.81, 0.49, -0.33)
                    .normalize()
                    .multiplyScalar(135);
                cometMat.opacity = 1;
                scene.add(comet);
            } else {
                milky.add(comet); // 位置は初回の「静かな空」で決まる（それまで透明）
            }

            // ====== 昼の光の帯（黄道光風）：夜の天の川に対応する“昼版”。太陽方向から空へ淡い暖色ヘイズ ======
            const zodiacMat = new THREE.ShaderMaterial({
                uniforms: {
                    uVisible: { value: 0 }, // 昼側で 0→1
                    uSunDir: { value: sunDir }, // 共有 sunDir（updateSunDir で更新）
                    uTime: { value: 0 },
                },
                side: THREE.BackSide,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexShader: `
    varying vec3 vDir;
    void main() {
      vDir = normalize(position);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
                fragmentShader: `
    varying vec3 vDir;
    uniform float uVisible;
    uniform float uTime;
    uniform vec3 uSunDir;
    ${NOISE_GLSL}
    void main() {
      vec3 d = normalize(vDir);
      vec3 S = normalize(uSunDir);
      float sa = dot(d, S);
      // 太陽方向へ強く引っ張られる濃淡（近いほど濃い）＋ごく薄い全天ベース
      float sunward = 0.12 + 0.88 * pow(clamp(sa * 0.5 + 0.5, 0.0, 1.0), 3.0);
      // やや細めの帯＋fbm でムラ
      vec3 N = normalize(vec3(0.2, 1.0, 0.15));
      float off = dot(d, N);
      float band = exp(-off * off / (2.0 * 0.38 * 0.38));
      float structure = 0.5 + 0.5 * fbm(d * 2.5 + vec3(uTime * 0.02)); // ゆっくり流れるムラ
      float amt = sunward * (0.45 + 0.55 * band) * structure;
      vec3 col = vec3(1.0, 0.91, 0.80) * amt * 0.42; // 暖色白・少し薄め
      gl_FragColor = vec4(col * uVisible, 1.0);
    }`,
            });
            const zodiac = new THREE.Mesh(
                new THREE.SphereGeometry(148, 48, 48),
                zodiacMat,
            );
            scene.add(zodiac);

            // ====== 月（昼空にそっと浮かぶ静かな天体。太陽光で満ち欠け） ======
            const moonVert = `
    varying vec3 vObjPos;
    varying vec3 vWorldNormal;
    void main() {
      vObjPos = normalize(position);
      vWorldNormal = normalize(mat3(modelMatrix) * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`;
            const moonFrag = `
    uniform vec3 uSunDir;
    uniform float uAlpha;
    varying vec3 vObjPos;
    varying vec3 vWorldNormal;
    ${NOISE_GLSL}
    void main() {
      // 表面：灰色ベース＋暗い海(maria)＋細かいむら
      float m = fbm(vObjPos * 2.4);
      float maria = smoothstep(0.55, 0.30, m);
      float crater = fbm(vObjPos * 14.0) * 0.12;
      vec3 base = mix(vec3(0.62, 0.60, 0.57), vec3(0.34, 0.34, 0.36), maria);
      base *= (0.92 + crater);
      // 太陽光ライティング（満ち欠け）。裏側もわずかに残す
      float lit = clamp(dot(normalize(vWorldNormal), normalize(uSunDir)), 0.0, 1.0);
      float shade = 0.14 + 0.86 * smoothstep(0.0, 0.25, lit); // 暗い面も地球照でうっすら残す（消えないように）
      gl_FragColor = vec4(base * shade, uAlpha);
    }`;
            const moonMat = new THREE.ShaderMaterial({
                uniforms: {
                    uSunDir: { value: sunDir },
                    uAlpha: { value: 1.0 },
                },
                vertexShader: moonVert,
                fragmentShader: moonFrag,
            });
            const MOON_R = 0.5; // 月の球サイズ（半径）
            const moon = new THREE.Mesh(
                new THREE.SphereGeometry(MOON_R, 48, 48),
                moonMat,
            );
            let moonAng = 1.1; // 公転の初期角
            const MOON_ORBIT_R = 20; // 公転半径（地球中心まわり）
            // 月の位置：太陽と同じ軌道面を earthCenter まわりに公転（太陽の subsolar と同じ式で経度だけ moonAng）。
            const _moonLocal = new THREE.Vector3();
            function moonPositionAt(ang, out) {
                const cd = Math.cos(sunDecl);
                _moonLocal.set(
                    cd * Math.cos(ang),
                    Math.sin(sunDecl),
                    -cd * Math.sin(ang),
                );
                return out
                    .copy(_moonLocal)
                    .applyQuaternion(earth.quaternion)
                    .multiplyScalar(MOON_ORBIT_R)
                    .add(earthCenter);
            }
            scene.add(moon);

            const earthMat = new THREE.ShaderMaterial({
                uniforms: earthUniforms,
                vertexShader: `
    varying vec3 vObjPos;
    varying vec3 vWorldNormal;
    varying vec3 vViewNormal;
    varying vec3 vViewPos;
    void main() {
      vObjPos = normalize(position);
      vWorldNormal = normalize(mat3(modelMatrix) * normal);
      vViewNormal = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vViewPos = mv.xyz;
      gl_Position = projectionMatrix * mv;
    }`,
                fragmentShader: `
    uniform float uTime;
    uniform float uBass;
    uniform float uMid;
    uniform vec3 uSunDir;
    varying vec3 vObjPos;
    varying vec3 vWorldNormal;
    varying vec3 vViewNormal;
    varying vec3 vViewPos;
    ${NOISE_GLSL}
    void main() {
      vec3 p = vObjPos;
      // ドメインワーピング：入り組んだリアルな海岸線を作る
      vec3 q = vec3(fbm(p * 1.3), fbm(p * 1.3 + vec3(5.2, 1.3, 2.8)), fbm(p * 1.3 + vec3(1.7, 9.2, 4.1)));
      float cont = fbm7(p * 2.6 + q * 1.2);
      float land = smoothstep(0.615, 0.635, cont);             // くっきりした海岸線（海:陸≈7:3）
      float coast = smoothstep(0.56, 0.615, cont) * (1.0 - land); // 大陸棚の浅瀬

      // 海：深さのムラ + 浅瀬のターコイズ
      float od = fbm(p * 6.0 + 13.0);
      vec3 ocean = mix(vec3(0.02, 0.10, 0.30), vec3(0.04, 0.28, 0.50), od);
      ocean = mix(ocean, vec3(0.05, 0.42, 0.52), coast * 0.8);

      // 陸：植生・乾燥帯・山岳・雪のディテール
      float terr = fbm7(p * 8.0 + 7.7);
      float arid = fbm(p * 3.1 + 21.0);
      vec3 veg = mix(vec3(0.09, 0.38, 0.15), vec3(0.22, 0.50, 0.18), terr);
      vec3 dry = mix(vec3(0.48, 0.38, 0.18), vec3(0.62, 0.52, 0.30), terr);
      vec3 landC = mix(veg, dry, smoothstep(0.42, 0.66, arid));
      landC = mix(landC, vec3(0.50, 0.47, 0.42), smoothstep(0.62, 0.80, terr) * 0.7); // 山岳
      float snow = smoothstep(0.80, 0.90, abs(p.y) + terr * 0.16);                    // 高山・高緯度の雪
      landC = mix(landC, vec3(0.92, 0.95, 0.98), snow);

      float polar = smoothstep(0.88, 0.96, abs(p.y));
      vec3 base = mix(ocean, landC, land);
      base = mix(base, vec3(0.90, 0.94, 0.98), polar);

      // 雲：渦を巻く2層構造でゆっくり流れる
      float cw = fbm(p * 3.0 + vec3(uTime * 0.010));
      float cl = fbm7(p * 4.2 + vec3(uTime * 0.012, 0.0, uTime * 0.007) + cw * 1.2);
      float clouds = smoothstep(0.61, 0.80, cl); // 局所的な雲系だけ残す

      // 昼夜 + 明暗境界（朝夕）の赤み
      float day = clamp(dot(vWorldNormal, uSunDir), 0.0, 1.0);
      float dusk = smoothstep(0.0, 0.18, day) * (1.0 - smoothstep(0.18, 0.45, day));
      vec3 col = base * (0.10 + 1.15 * day);
      col += vec3(0.90, 0.45, 0.20) * dusk * 0.25;
      col = mix(col, vec3(0.90, 0.93, 0.97) * (0.30 + 0.95 * day), clouds * 0.7);

      // 夜の街明かり（低音で強まる・雲の下では減光）
      float night = 1.0 - smoothstep(0.0, 0.25, day);
      float lights = smoothstep(0.70, 0.78, noise(p * 90.0)) * land * (1.0 - clouds * 0.8) * night;
      col += vec3(1.0, 0.72, 0.40) * lights * (0.8 + uBass * 2.2);

      // 大気フレネル発光（低音で脈動、中音で色相が遷移）
      // リム発光は縁に集中させる（指数を上げて地表の青白い被りを防ぐ）
      vec3 viewDir = normalize(-vViewPos);
      float fres = pow(1.0 - clamp(dot(viewDir, normalize(vViewNormal)), 0.0, 1.0), 4.5);
      vec3 atmA = vec3(0.25, 0.55, 1.0);
      vec3 atmB = vec3(0.30, 0.95, 0.75);
      col += mix(atmA, atmB, clamp(uMid * 1.4, 0.0, 1.0)) * fres * (1.2 + uBass * 2.0);

      // 全体の発光底上げ
      col += base * uBass * 0.18;
      gl_FragColor = vec4(col, 1.0);
    }`,
            });
            const earth = new THREE.Mesh(
                new THREE.SphereGeometry(CONFIG.earthRadius, 160, 160),
                earthMat,
            );
            earth.position.set(...CONFIG.earthPos);
            // x: 地軸をカメラから倒し、極地ではなく赤道〜温帯が見えるように
            // y: 初期経度 2.4 ≈ 日本列島が見える面から始まり、自転で西へ巡る
            // x=-0.5: 軸の傾きを浅くして本州〜北日本まで見えるように（開始＝日本上空）
            // y=3.9: 初期経度。日本列島が中央に来る。自転(tourSpin)で西＝ユーラシアへ巡る
            earth.rotation.set(-0.5, 3.7, 0);
            const ryOverride = location.search.match(/ry=([-\d.]+)/);
            if (ryOverride) earth.rotation.y = parseFloat(ryOverride[1]); // 撮影確認用：初期経度の上書き
            scene.add(earth);

            // ====== ビジュアライザー要素（ビート連動：流星 / 波紋リング / 極オーロラ） ======
            const earthCenter = new THREE.Vector3(...CONFIG.earthPos);

            // 流星：強いビートで星殻上を流れる短い光跡（LineSegments プール）
            const METEOR_N = 8;
            const meteorGeo = new THREE.BufferGeometry();
            const meteorPos = new Float32Array(METEOR_N * 2 * 3);
            const meteorAlpha = new Float32Array(METEOR_N * 2);
            meteorGeo.setAttribute(
                "position",
                new THREE.BufferAttribute(meteorPos, 3),
            );
            meteorGeo.setAttribute(
                "aAlpha",
                new THREE.BufferAttribute(meteorAlpha, 1),
            );
            const meteors = new THREE.LineSegments(
                meteorGeo,
                new THREE.ShaderMaterial({
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending,
                    vertexShader: `attribute float aAlpha; varying float vA;
    void main(){ vA = aAlpha; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                    fragmentShader: `varying float vA; void main(){ gl_FragColor = vec4(vec3(0.85, 0.92, 1.0) * vA, vA); }`,
                }),
            );
            meteors.frustumCulled = false;
            scene.add(meteors);
            const meteorState = [];
            for (let i = 0; i < METEOR_N; i++)
                meteorState.push({
                    active: false,
                    life: 0,
                    vx: 0,
                    vy: 0,
                    vz: 0,
                    hx: 0,
                    hy: 0,
                    hz: 0,
                });
            function spawnMeteor() {
                const m = meteorState.find((s) => !s.active);
                if (!m) return;
                // カメラ視界内に出して斜めに流す（入る側・高さ・距離・向きはランダムで自然に）
                camera.getWorldDirection(_camFwd);
                _camRight.crossVectors(_camFwd, _WORLD_UP).normalize();
                _camUp.crossVectors(_camRight, _camFwd).normalize();
                const D = 34 + Math.random() * 26; // 距離34〜60（遠近でサイズにばらつき）
                const side = Math.random() < 0.5 ? -1 : 1; // 左右どちらから入るか
                const ox = side * (10 + Math.random() * 12); // 画面端寄りから開始
                const oy = 8 + Math.random() * 12; // 上空の高さ
                m.hx =
                    camera.position.x +
                    _camFwd.x * D +
                    _camRight.x * ox +
                    _camUp.x * oy;
                m.hy =
                    camera.position.y +
                    _camFwd.y * D +
                    _camRight.y * ox +
                    _camUp.y * oy;
                m.hz =
                    camera.position.z +
                    _camFwd.z * D +
                    _camRight.z * ox +
                    _camUp.z * oy;
                const sp = 20 + Math.random() * 16;
                // 画面上で内向き（入った側と逆）＋下向きに流れる向きを world 空間へ
                const rx = -side * (0.6 + Math.random() * 0.5),
                    uy = -(0.7 + Math.random() * 0.6);
                const dx = _camRight.x * rx + _camUp.x * uy,
                    dy = _camRight.y * rx + _camUp.y * uy,
                    dz = _camRight.z * rx + _camUp.z * uy;
                const dl = Math.hypot(dx, dy, dz) || 1;
                m.vx = (dx / dl) * sp;
                m.vy = (dy / dl) * sp;
                m.vz = (dz / dl) * sp;
                m.life = 1;
                m.active = true;
            }
            function updateMeteors(dt) {
                for (let i = 0; i < METEOR_N; i++) {
                    const m = meteorState[i],
                        o = i * 6,
                        oa = i * 2;
                    if (!m.active) continue;
                    m.life -= dt / 1.1;
                    if (m.life <= 0) {
                        m.active = false;
                        meteorAlpha[oa] = 0;
                        meteorAlpha[oa + 1] = 0;
                        continue;
                    }
                    m.hx += m.vx * dt;
                    m.hy += m.vy * dt;
                    m.hz += m.vz * dt;
                    const nl = Math.hypot(m.vx, m.vy, m.vz) || 1,
                        tl = 3.5;
                    meteorPos[o] = m.hx;
                    meteorPos[o + 1] = m.hy;
                    meteorPos[o + 2] = m.hz;
                    meteorPos[o + 3] = m.hx - (m.vx / nl) * tl;
                    meteorPos[o + 4] = m.hy - (m.vy / nl) * tl;
                    meteorPos[o + 5] = m.hz - (m.vz / nl) * tl;
                    meteorAlpha[oa] = m.life;
                    meteorAlpha[oa + 1] = 0.0; // 頭=明、尾=透明
                }
                meteorGeo.attributes.position.needsUpdate = true;
                meteorGeo.attributes.aAlpha.needsUpdate = true;
            }
            let ambientMeteorTimer = isPreview ? 0.15 : 4; // 無音でも流れ星を出すタイマー（preview は即・以降高頻度）

            // 波紋リング：ビートで地球から広がる光輪（ビルボード・additive プール）
            const RING_N = 4;
            const ringGeoBase = new THREE.RingGeometry(0.8, 1.0, 72);
            const ringPool = [];
            for (let i = 0; i < RING_N; i++) {
                const mat = new THREE.MeshBasicMaterial({
                    color: 0x6fb3ff,
                    transparent: true,
                    opacity: 0,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                });
                const mesh = new THREE.Mesh(ringGeoBase, mat);
                mesh.position.copy(earthCenter);
                mesh.visible = false;
                scene.add(mesh);
                ringPool.push({ mesh, mat, life: 0, strength: 0 });
            }
            function spawnRing(strength) {
                const r = ringPool.find((x) => x.life <= 0);
                if (!r) return;
                r.life = 1;
                r.strength = strength;
                r.mesh.visible = true;
            }
            function updateRings() {
                for (const r of ringPool) {
                    if (r.life <= 0) continue;
                    r.life -= 0.016 / 1.4; // 約1.4秒で消える（フレーム非依存ほどではないが十分）
                    if (r.life <= 0) {
                        r.mesh.visible = false;
                        continue;
                    }
                    const p = 1 - r.life;
                    const s = CONFIG.earthRadius * (1.02 + p * 0.55); // 縁の少し外まで広がる波紋ハロー
                    r.mesh.scale.set(s, s, s);
                    r.mesh.quaternion.copy(camera.quaternion); // ビルボード
                    r.mat.opacity = (1 - p) * 0.7 * (0.5 + r.strength * 0.5);
                }
            }

            // 極オーロラ：地球の極に立ち上がる光のカーテン（earth の子・自転で出入り）
            function makeAurora(sign) {
                const R = CONFIG.earthRadius;
                const geo = new THREE.CylinderGeometry(
                    R * 0.55,
                    R * 0.74,
                    R * 0.5,
                    96,
                    1,
                    true,
                );
                const mat = new THREE.ShaderMaterial({
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide,
                    uniforms: { uTime: { value: 0 }, uAudio: { value: 0 } },
                    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                    fragmentShader: `
      uniform float uTime; uniform float uAudio; varying vec2 vUv;
      ${NOISE_GLSL}
      void main(){
        float curtain = fbm(vec3(vUv.x * 16.0, vUv.y * 3.0 - uTime * 0.15, uTime * 0.05));
        float streak = smoothstep(0.35, 0.85, curtain);
        float vfade = smoothstep(0.0, 0.25, vUv.y) * (1.0 - smoothstep(0.6, 1.0, vUv.y));
        vec3 col = mix(vec3(0.2, 0.95, 0.5), vec3(0.3, 0.6, 1.0), vUv.y); // 緑→青
        float a = streak * vfade * (0.35 + uAudio * 0.8);
        gl_FragColor = vec4(col * a, a);
      }`,
                });
                const m = new THREE.Mesh(geo, mat);
                m.position.y = sign * R * 0.92; // 緯度~42°の地表から立ち上がる（極は地平線の向こうで見えないため可視域へ）
                if (sign < 0) m.rotation.x = Math.PI;
                earth.add(m);
                return mat;
            }
            const auroraN = makeAurora(1),
                auroraS = makeAurora(-1);

            // ====== 見える太陽（表面シェーダー＋彩層リム＋グロー）と遮蔽シーン ======
            // sunGroup を sunDir 方向の遠方に置き、カメラが地球の裏に回ると地球が太陽を覆って
            // 日食になる。ゴッドレイ用に「太陽=明/地球=黒」の occScene も用意する。
            const SUN_DIST = 80; // 地球中心からの太陽距離（star殻r40-90内・far200以内）
            const SUN_RADIUS = 7.0; // 太陽コア半径（視半径≈4° → 地球r7に覆われる）
            const sunPivot = new THREE.Vector3(...CONFIG.earthPos);

            // 太陽コア：Perlin/fbm による炎のうねり（自発光）
            const sunCoreMat = new THREE.ShaderMaterial({
                // 縁をフレネルでフェードさせる柔らかい発光オーブ（硬い円盤シルエットを出さない）
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.FrontSide,
                uniforms: { uTime: { value: 0 }, uBright: { value: 1.0 } },
                vertexShader: `
    varying vec3 vPos;
    varying vec3 vN;
    varying vec3 vView;
    void main() {
      vPos = position;
      vN = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vView = mv.xyz;
      gl_Position = projectionMatrix * mv;
    }`,
                fragmentShader: `
    uniform float uTime;
    uniform float uBright;
    varying vec3 vPos;
    varying vec3 vN;
    varying vec3 vView;
    float hash(vec3 p){ p = fract(p*0.3183099 + vec3(0.1,0.2,0.3)); p *= 17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
    float noise(vec3 x){
      vec3 i = floor(x); vec3 f = fract(x); f = f*f*(3.0-2.0*f);
      return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                 mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
    }
    float fbm(vec3 p){ float v=0.0,a=0.5; for(int i=0;i<6;i++){ v+=a*noise(p); p*=2.03; a*=0.5; } return v; }
    void main(){
      vec3 p = normalize(vPos);
      float n1 = fbm(p*3.0 + vec3(0.0, uTime*0.06, 0.0));
      float n2 = fbm(p*7.5 - vec3(uTime*0.10, 0.0, uTime*0.05));
      float h = n1*0.6 + n2*0.4;
      vec3 cool = vec3(0.95, 0.30, 0.06);
      vec3 mid  = vec3(1.0, 0.62, 0.20);
      vec3 hot  = vec3(1.0, 0.96, 0.80);
      vec3 col = mix(cool, mid, smoothstep(0.30, 0.60, h));
      col = mix(col, hot, smoothstep(0.62, 0.95, h));
      col *= (0.80 + uBright * 0.35);
      // 視線に対する正対度（中心=1, 縁=0）で外周を透明にフェード→硬い輪郭を消す
      float f = clamp(dot(normalize(vN), normalize(-vView)), 0.0, 1.0);
      float edge = smoothstep(0.0, 0.55, f);
      gl_FragColor = vec4(col, edge);
    }`,
            });
            const sunCore = new THREE.Mesh(
                new THREE.SphereGeometry(SUN_RADIUS, 96, 96),
                sunCoreMat,
            );

            // 彩層（chromosphere）：外周だけ光るリム（BackSide・加算）
            const chromoMat = new THREE.ShaderMaterial({
                uniforms: { uBright: { value: 1.0 } },
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                vertexShader: `
    varying vec3 vN; varying vec3 vView;
    void main(){
      vN = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vView = mv.xyz;
      gl_Position = projectionMatrix * mv;
    }`,
                fragmentShader: `
    uniform float uBright;
    varying vec3 vN; varying vec3 vView;
    void main(){
      float rim = pow(1.0 - abs(dot(normalize(-vView), normalize(vN))), 1.4); // 広く柔らかいフォール
      vec3 col = mix(vec3(1.0,0.45,0.15), vec3(1.0,0.78,0.40), rim);
      gl_FragColor = vec4(col, rim * (0.5 + uBright * 0.35)); // 鋭い明環にしない
    }`,
            });
            const chromo = new THREE.Mesh(
                new THREE.SphereGeometry(SUN_RADIUS * 1.06, 64, 64),
                chromoMat,
            );

            // グロースプライト：放射グラデのテクスチャを加算で2枚重ねる
            function glowTexture(stops) {
                const s = 256,
                    c = document.createElement("canvas");
                c.width = c.height = s;
                const ctx = c.getContext("2d");
                const g = ctx.createRadialGradient(
                    s / 2,
                    s / 2,
                    0,
                    s / 2,
                    s / 2,
                    s / 2,
                );
                stops.forEach((st) => g.addColorStop(st[0], st[1]));
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, s, s);
                const tex = new THREE.CanvasTexture(c);
                tex.needsUpdate = true;
                return tex;
            }
            function makeGlow(tex, scale) {
                const sp = new THREE.Sprite(
                    new THREE.SpriteMaterial({
                        map: tex,
                        blending: THREE.AdditiveBlending,
                        transparent: true,
                        depthWrite: false,
                        depthTest: true,
                    }),
                );
                sp.scale.set(scale, scale, 1);
                return sp;
            }
            // ワールド空間のグロー。ブルーム/ゴッドレイ（スクリーンスペース）は太陽が画面外に
            // 出ると効かなくなるため、画面端〜枠外での輝きはこのスプライトが担う（強め・大きめ）。
            const innerGlow = makeGlow(
                glowTexture([
                    [0.0, "rgba(255,240,210,0.75)"],
                    [0.25, "rgba(255,195,115,0.40)"],
                    [0.55, "rgba(255,140,60,0.15)"],
                    [1.0, "rgba(255,120,40,0.0)"],
                ]),
                SUN_RADIUS * 3.5,
            );
            const outerGlow = makeGlow(
                glowTexture([
                    [0.0, "rgba(255,210,150,0.35)"],
                    [0.4, "rgba(255,150,70,0.14)"],
                    [1.0, "rgba(255,120,40,0.0)"],
                ]),
                SUN_RADIUS * 10.0,
            );

            const sunGroup = new THREE.Group();
            sunGroup.add(sunCore, chromo, innerGlow, outerGlow);
            scene.add(sunGroup);

            // 遮蔽シーン：太陽=白・地球=黒。深度で地球が太陽を欠けさせる＝日食をゴッドレイに伝える
            const occScene = new THREE.Scene();
            occScene.background = new THREE.Color(0x000000);
            const occEarth = new THREE.Mesh(
                earth.geometry,
                new THREE.MeshBasicMaterial({ color: 0x000000 }),
            );
            const occSun = new THREE.Mesh(
                sunCore.geometry,
                new THREE.MeshBasicMaterial({ color: 0xffffff }),
            );
            occScene.add(occEarth, occSun);

            // ====== 太陽：実際にいま地球に当たっている光を再現 ======
            // 太陽直下点（経度 ≈ (12-UTC時)×15°、緯度 = 季節の赤緯）を地球の姿勢で
            // ワールド方向に変換して光源方向にする。sunDir は各シェーダーと共有
            const subsolarObj = new THREE.Vector3();
            let sunDecl = 0; // 太陽の赤緯（季節による）。月の公転面を太陽に一致させるため共有。
            // ?time=HH:MM（当日のローカル時刻）または ?time=2026-07-02T18:00（ISO日時）で
            // 開始時刻を指定できる。指定時刻との差分をオフセットとして保持し、以降は通常速度で進む。
            const timeParam = new URLSearchParams(location.search).get("time");
            let timeOffsetMs = 0;
            if (timeParam) {
                const hm = timeParam.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
                let target = null;
                if (hm) {
                    target = new Date();
                    target.setHours(+hm[1], +hm[2], +(hm[3] || 0), 0);
                } else {
                    const d = new Date(timeParam);
                    if (!isNaN(d.getTime())) target = d;
                }
                if (target) timeOffsetMs = target.getTime() - Date.now();
            }
            function updateSunDir() {
                const now = new Date(Date.now() + timeOffsetMs);
                const utcH =
                    now.getUTCHours() +
                    now.getUTCMinutes() / 60 +
                    now.getUTCSeconds() / 3600;
                const lon = ((12 - utcH) * 15 * Math.PI) / 180;
                const doy =
                    (now.getTime() - Date.UTC(now.getUTCFullYear(), 0, 0)) /
                    86400000;
                const decl =
                    ((23.44 * Math.PI) / 180) *
                    Math.sin((2 * Math.PI * (doy - 81)) / 365.25);
                sunDecl = decl; // 月の公転面（太陽と同一の赤緯円）で参照
                subsolarObj.set(
                    Math.cos(decl) * Math.cos(lon),
                    Math.sin(decl),
                    -Math.cos(decl) * Math.sin(lon),
                );
                sunDir
                    .copy(subsolarObj)
                    .applyQuaternion(earth.quaternion)
                    .normalize();
                sun.position.copy(sunDir).multiplyScalar(50);
                // 見える太陽は地球中心から sunDir 方向の遠方へ（地球の裏に回ると日食になる距離）
                sunGroup.position
                    .copy(sunDir)
                    .multiplyScalar(SUN_DIST)
                    .add(sunPivot);
            }
            updateSunDir();

            // 大気ハロー（外側の発光殻）
            const atmoUniforms = { uBass: { value: 0 }, uMid: { value: 0 } };
            const atmoMat = new THREE.ShaderMaterial({
                uniforms: atmoUniforms,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                // 裏面のみ描画：地球本体に遮蔽され、発光がリムの外側だけに残る
                side: THREE.BackSide,
                vertexShader: `
    varying vec3 vViewNormal;
    varying vec3 vViewPos;
    void main() {
      vViewNormal = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vViewPos = mv.xyz;
      gl_Position = projectionMatrix * mv;
    }`,
                fragmentShader: `
    uniform float uBass;
    uniform float uMid;
    varying vec3 vViewNormal;
    varying vec3 vViewPos;
    void main() {
      vec3 viewDir = normalize(-vViewPos);
      float rim = pow(1.0 - abs(dot(viewDir, normalize(vViewNormal))), 2.5);
      vec3 col = mix(vec3(0.25, 0.55, 1.0), vec3(0.35, 0.95, 0.80), clamp(uMid * 1.4, 0.0, 1.0));
      gl_FragColor = vec4(col, rim * (0.85 + uBass * 1.5));
    }`,
            });
            const atmo = new THREE.Mesh(
                new THREE.SphereGeometry(CONFIG.earthRadius * 1.1, 96, 96),
                atmoMat,
            );
            atmo.position.copy(earth.position);
            scene.add(atmo);

            // ====== 高精細テクスチャ地球（NASA系8K素材。読み込めたらプロシージャルから差し替え） ======
            const earthTexUniforms = {
                uBass: { value: 0 },
                uMid: { value: 0 },
                uSunDir: { value: sunDir },
                uSunDirView: { value: sunDir.clone() },
                tDay: { value: null },
                tNight: { value: null },
                tSpec: { value: null },
            };
            const earthTexMat = new THREE.ShaderMaterial({
                uniforms: earthTexUniforms,
                vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldNormal;
    varying vec3 vViewNormal;
    varying vec3 vViewPos;
    void main() {
      vUv = uv;
      vWorldNormal = normalize(mat3(modelMatrix) * normal);
      vViewNormal = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vViewPos = mv.xyz;
      gl_Position = projectionMatrix * mv;
    }`,
                fragmentShader: `
    uniform sampler2D tDay;
    uniform sampler2D tNight;
    uniform sampler2D tSpec;
    uniform float uBass;
    uniform float uMid;
    uniform vec3 uSunDir;
    uniform vec3 uSunDirView;
    varying vec2 vUv;
    varying vec3 vWorldNormal;
    varying vec3 vViewNormal;
    varying vec3 vViewPos;
    void main() {
      vec3 day = texture2D(tDay, vUv).rgb;
      vec3 night = texture2D(tNight, vUv).rgb;
      float specMask = texture2D(tSpec, vUv).r;
      float sd = dot(normalize(vWorldNormal), uSunDir);
      float dayF = smoothstep(-0.08, 0.25, sd);
      float dusk = smoothstep(-0.12, 0.05, sd) * (1.0 - smoothstep(0.05, 0.30, sd));
      vec3 col = day * (0.030 + 0.80 * dayF); // 夜面はほぼ漆黒に（街明かりとリム光だけ残す）
      col += day * vec3(0.90, 0.40, 0.18) * dusk * 0.8;   // 明暗境界の赤み
      col += night * (1.0 - dayF) * (0.9 + uBass * 1.8);   // 夜の街明かり（低音で脈動）
      // 海面の太陽光反射（スペキュラマスク）
      vec3 viewDir = normalize(-vViewPos);
      vec3 Nv = normalize(vViewNormal);
      vec3 R = reflect(-uSunDirView, Nv);
      col += vec3(1.0, 0.92, 0.75) * pow(max(dot(R, viewDir), 0.0), 34.0) * specMask * dayF * 0.55;
      // 大気フレネル発光（低音で脈動、中音で色相が遷移）
      float fres = pow(1.0 - clamp(dot(viewDir, Nv), 0.0, 1.0), 4.5);
      col += mix(vec3(0.25, 0.55, 1.0), vec3(0.30, 0.95, 0.75), clamp(uMid * 1.4, 0.0, 1.0)) * fres * (1.2 + uBass * 2.0);
      col += day * uBass * 0.15;
      gl_FragColor = vec4(col, 1.0);
    }`,
            });
            // 雲レイヤー（本体よりわずかに大きい球を別速度で回す）
            const cloudUniforms = {
                uSunDir: { value: sunDir },
                tCloud: { value: null },
                uTime: { value: 0 },
            };
            const cloudMat = new THREE.ShaderMaterial({
                uniforms: cloudUniforms,
                transparent: true,
                depthWrite: false,
                vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldNormal;
    void main() {
      vUv = uv;
      vWorldNormal = normalize(mat3(modelMatrix) * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
                fragmentShader: `
    uniform sampler2D tCloud;
    uniform vec3 uSunDir;
    uniform float uTime;
    varying vec2 vUv;
    varying vec3 vWorldNormal;
    ${NOISE_GLSL}
    void main() {
      vec3 wp = normalize(vWorldNormal);
      // ゆっくり churn：法線ベースの fbm で UV を微小に揺らす（継ぎ目を避ける）
      float wobble = fbm(wp * 2.2 + vec3(uTime * 0.02, 0.0, uTime * 0.013)) - 0.5;
      float lum = texture2D(tCloud, vUv + wobble * 0.012).r;
      float dayF = smoothstep(-0.08, 0.25, dot(wp, uSunDir));
      gl_FragColor = vec4(vec3(0.045 + 1.05 * dayF), lum * 0.85);
    }`,
            });
            const clouds = new THREE.Mesh(
                new THREE.SphereGeometry(CONFIG.earthRadius * 1.006, 128, 128),
                cloudMat,
            );
            clouds.position.copy(earth.position);
            clouds.rotation.copy(earth.rotation);
            let texturedEarth = false;
            {
                const loader = new THREE.TextureLoader();
                const maxAniso = renderer.capabilities.getMaxAnisotropy();
                const load = (url) =>
                    new Promise((res, rej) =>
                        loader.load(
                            url,
                            (t) => {
                                t.anisotropy = maxAniso;
                                res(t);
                            },
                            undefined,
                            rej,
                        ),
                    );
                Promise.all([
                    load("./textures/earth_day_8k.jpg"),
                    load("./textures/earth_night_4k.jpg"),
                    load("./textures/earth_spec_2k.jpg"),
                    load("./textures/earth_clouds_4k.jpg"),
                ])
                    .then(([d, n, s, c]) => {
                        earthTexUniforms.tDay.value = d;
                        earthTexUniforms.tNight.value = n;
                        earthTexUniforms.tSpec.value = s;
                        cloudUniforms.tCloud.value = c;
                        earth.material = earthTexMat;
                        scene.add(clouds);
                        texturedEarth = true;
                    })
                    .catch(() => {
                        /* file:// 等で読めない環境ではプロシージャル地球のまま動かす */
                    });
            }

            // ====== キャラクター共通の素材・ヘルパー ======
            const gradientMap = (() => {
                const data = new Uint8Array([80, 160, 255]);
                const tex = new THREE.DataTexture(data, 3, 1, THREE.RedFormat);
                tex.minFilter = THREE.NearestFilter;
                tex.magFilter = THREE.NearestFilter;
                tex.needsUpdate = true;
                return tex;
            })();
            const matSuit = new THREE.MeshToonMaterial({
                color: 0xdfe5ec,
                gradientMap,
            });

            // 顔：原画の「ゆるい手描き顔」をCanvasに描き、頭の球にテクスチャとして貼る
            // （点目・小さな鼻・ωの口。マズルの出っ張りなしの平面的な顔が原画の特徴）
            function makeFaceTexture(blink) {
                const cv = document.createElement("canvas");
                cv.width = 1024;
                cv.height = 512; // 球のequirectangular展開。中央(512)が顔の正面
                const g = cv.getContext("2d");
                g.fillStyle = "#ffffff";
                g.fillRect(0, 0, 1024, 512);
                g.fillStyle = "#332b22";
                g.strokeStyle = "#332b22";
                g.lineCap = "round";
                if (blink) {
                    // 閉じた目：下にゆるく弧を描くまぶた
                    g.lineWidth = 7;
                    for (const sx of [-98, 98]) {
                        g.beginPath();
                        g.arc(
                            512 + sx,
                            230,
                            13,
                            Math.PI * 0.15,
                            Math.PI * 0.85,
                        );
                        g.stroke();
                    }
                } else {
                    // 開いた目：小さな点を左右に大きく離して
                    for (const sx of [-98, 98]) {
                        g.beginPath();
                        g.ellipse(512 + sx, 236, 10, 12, 0, 0, Math.PI * 2);
                        g.fill();
                    }
                }
                // 鼻：小さな横長の点
                g.beginPath();
                g.ellipse(512, 258, 11, 8, 0, 0, Math.PI * 2);
                g.fill();
                // 口：ω型（下にふくらむ小さな弧を2つ）
                g.lineWidth = 7;
                g.beginPath();
                g.arc(500, 280, 12, 0, Math.PI);
                g.stroke();
                g.beginPath();
                g.arc(524, 280, 12, 0, Math.PI);
                g.stroke();
                const tex = new THREE.CanvasTexture(cv);
                tex.encoding = THREE.sRGBEncoding;
                tex.anisotropy = 4;
                return tex;
            }

            // シャツの文字：?shirt=文字 で任意の文字を白抜き表示（既定は無地シャツ）
            function makeLogoTexture() {
                const cv = document.createElement("canvas");
                cv.width = 1024;
                cv.height = 512; // シャツ前面に巻く帯（弧:高さ ≈ 2:1）に合わせる
                const g = cv.getContext("2d");
                // 透明背景だとミップマップ縮小時に白文字が黒ずむため、シャツと同じ青で塗り潰す
                g.fillStyle =
                    "#" + CONFIG.shirtColor.toString(16).padStart(6, "0");
                g.fillRect(0, 0, 1024, 512);
                const shirtText = new URLSearchParams(location.search).get(
                    "shirt",
                );
                if (shirtText) {
                    g.fillStyle = "#ffffff";
                    g.textAlign = "center";
                    g.textBaseline = "middle";
                    const family =
                        '"Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif';
                    g.font = "bold 270px " + family;
                    // 長い文字列は帯の幅（見える範囲）に収まるようフォントを縮小
                    const w = g.measureText(shirtText).width;
                    if (w > 940)
                        g.font =
                            "bold " +
                            Math.floor((270 * 940) / w) +
                            "px " +
                            family;
                    g.fillText(shirtText, 512, 252);
                }
                // encoding は指定しない：material.color の扱い（リニア直値）と揃えて
                // シャツ本体と帯の青のトーンを一致させる
                const tex = new THREE.CanvasTexture(cv);
                tex.anisotropy = 4;
                return tex;
            }
            const matOutline = new THREE.MeshBasicMaterial({
                color: 0x1c1814,
                side: THREE.BackSide,
            });

            // キャラ造形の土台：グループ・部品追加・輪郭線（inverted hull）
            function charBase() {
                const group = new THREE.Group();
                const outlined = []; // 輪郭線を付けるメッシュ
                function part(geo, mat, x, y, z, opts) {
                    const m = new THREE.Mesh(geo, mat);
                    m.position.set(x, y, z);
                    if (opts && opts.rot) m.rotation.set(...opts.rot);
                    if (opts && opts.scale) m.scale.set(...opts.scale);
                    group.add(m);
                    if (!opts || opts.outline !== false) outlined.push(m);
                    return m;
                }
                // 輪郭線：本体メッシュの子にして手足の動きに追従させる
                function applyOutlines() {
                    for (const m of outlined) {
                        const o = new THREE.Mesh(m.geometry, matOutline);
                        o.scale.setScalar(1.05);
                        m.add(o);
                    }
                }
                return { group, part, applyOutlines };
            }

            // 宇宙飛行士装備：ヘルメット（透明バブル）・首リング・酸素タンク
            // 体格の違うキャラごとに位置・サイズを指定できるようパラメータ化（既定値は熊の値）
            function addGear(
                group,
                part,
                {
                    ringRadius,
                    ringY = -0.06,
                    helmetRadius = 0.8,
                    helmetY = 0.42,
                    tankY = -0.34,
                    tankZ = -0.46,
                },
            ) {
                const helmet = new THREE.Mesh(
                    new THREE.SphereGeometry(helmetRadius, 48, 48),
                    new THREE.MeshPhongMaterial({
                        color: 0xbcd8ff,
                        transparent: true,
                        opacity: 0.16,
                        shininess: 120,
                        specular: 0xffffff,
                        depthWrite: false,
                    }),
                );
                helmet.position.set(0, helmetY, 0);
                group.add(helmet);
                part(
                    new THREE.TorusGeometry(ringRadius, 0.075, 12, 32),
                    matSuit,
                    0,
                    ringY,
                    0,
                    { rot: [Math.PI / 2, 0, 0] },
                );
                part(
                    new THREE.CapsuleGeometry(0.12, 0.36, 8, 16),
                    matSuit,
                    -0.16,
                    tankY,
                    tankZ,
                );
                part(
                    new THREE.CapsuleGeometry(0.12, 0.36, 8, 16),
                    matSuit,
                    0.16,
                    tankY,
                    tankZ,
                );
            }

            // ====== 黄色い熊（プリミティブによるコード造形・トゥーン調） ======
            function buildBear() {
                const { group, part, applyOutlines } = charBase();
                const matBear = new THREE.MeshToonMaterial({
                    color: CONFIG.bearColor,
                    gradientMap,
                });
                const matShirt = new THREE.MeshToonMaterial({
                    color: CONFIG.shirtColor,
                    gradientMap,
                });
                const faceTexOpen = makeFaceTexture(false);
                const faceTexBlink = makeFaceTexture(true);
                const matBearFace = new THREE.MeshToonMaterial({
                    color: CONFIG.bearColor,
                    gradientMap,
                    map: faceTexOpen,
                });

                // 胴体・シャツ
                part(
                    new THREE.CapsuleGeometry(0.4, 0.45, 8, 24),
                    matBear,
                    0,
                    -0.45,
                    0,
                );
                part(
                    new THREE.CapsuleGeometry(0.44, 0.28, 8, 24),
                    matShirt,
                    0,
                    -0.28,
                    0,
                );
                // ロゴ帯：シャツ前面だけを覆う開いた円筒（θ=0 が +z 正面に来る）
                const logoBand = new THREE.Mesh(
                    new THREE.CylinderGeometry(
                        0.455,
                        0.455,
                        0.34,
                        32,
                        1,
                        true,
                        -0.75,
                        1.5,
                    ),
                    new THREE.MeshToonMaterial({
                        color: 0xffffff,
                        gradientMap,
                        map: makeLogoTexture(),
                    }),
                );
                logoBand.position.set(0, -0.27, 0);
                group.add(logoBand);
                // 頭（テクスチャの正面が +z を向くよう -90° 回転。原画に合わせ横長に潰す）・耳
                const head = part(
                    new THREE.SphereGeometry(0.54, 48, 48),
                    matBearFace,
                    0,
                    0.4,
                    0,
                    { rot: [0, -Math.PI / 2, 0], scale: [1, 0.84, 1.24] },
                );
                part(
                    new THREE.SphereGeometry(0.16, 24, 24),
                    matBear,
                    -0.5,
                    0.74,
                    0,
                );
                part(
                    new THREE.SphereGeometry(0.16, 24, 24),
                    matBear,
                    0.5,
                    0.74,
                    0,
                );
                // 腕・脚（付け根を軸に動くようジオメトリをオフセット）
                const armGeoL = new THREE.CapsuleGeometry(0.13, 0.3, 8, 16);
                armGeoL.translate(0, 0.15, 0);
                const armL = part(armGeoL, matBear, -0.5, -0.22, 0.1, {
                    rot: [0, 0, 0.9],
                });
                const armGeoR = new THREE.CapsuleGeometry(0.13, 0.3, 8, 16);
                armGeoR.translate(0, 0.15, 0);
                const armR = part(armGeoR, matBear, 0.52, -0.3, 0.05, {
                    rot: [0, 0, -0.7],
                });
                const legGeoL = new THREE.CapsuleGeometry(0.15, 0.24, 8, 16);
                legGeoL.translate(0, -0.12, 0);
                const legL = part(legGeoL, matBear, -0.2, -0.92, 0.06, {
                    rot: [0.25, 0, 0.15],
                });
                const legGeoR = new THREE.CapsuleGeometry(0.15, 0.24, 8, 16);
                legGeoR.translate(0, -0.12, 0);
                const legR = part(legGeoR, matBear, 0.2, -0.92, 0.06, {
                    rot: [0.25, 0, -0.15],
                });
                // しっぽ：お尻（酸素タンクの下）にちょこんと付く丸い毛玉
                part(
                    new THREE.SphereGeometry(0.13, 24, 24),
                    matBear,
                    0,
                    -0.74,
                    -0.42,
                );
                addGear(group, part, { ringRadius: 0.42 }); // 宇宙飛行士装備：ヘルメット・首リング・酸素タンク
                applyOutlines(); // 輪郭線（inverted hull）

                // 瞬き：3〜7秒間隔でランダム、たまに二連（状態はクロージャに保持）
                let blinkUntil = -1;
                let nextBlinkAt = 3;
                function updateFace(t, forceBlink) {
                    if (t >= nextBlinkAt) {
                        blinkUntil = t + 0.13;
                        nextBlinkAt =
                            Math.random() < 0.25
                                ? t + 0.45
                                : t + 3 + Math.random() * 4;
                    }
                    matBearFace.map =
                        forceBlink || t < blinkUntil ? faceTexBlink : faceTexOpen;
                }
                return { group, armL, armR, legL, legR, updateFace };
            }

            // ====== mspn（materials/IMG_9841.jpg 準拠：ずんぐり・手足短い・服なし） ======
            // 顔：下がり気味の短い線の目＋小さな∧の口。鼻なし・まばたきなし（原画の表情を固定）
            function makeMspnFaceTexture() {
                const cv = document.createElement("canvas");
                cv.width = 1024;
                cv.height = 512; // 球のequirectangular展開。中央(512)が顔の正面
                const g = cv.getContext("2d");
                g.fillStyle = "#ffffff";
                g.fillRect(0, 0, 1024, 512);
                g.strokeStyle = "#332b22";
                g.lineCap = "round";
                g.lineWidth = 9;
                // 目：目尻（外側）が下がる短いタレ目。原画は約45〜50°の急な傾きの
                // 手描きストロークなので、ごく浅いカーブで再現
                // 目の間をさらに詰め（内側の間隔144→120px）、目・口とも少し下げる（+10px）
                g.beginPath();
                g.moveTo(434, 210);
                g.quadraticCurveTo(440, 199, 452, 190);
                g.stroke();
                g.beginPath();
                g.moveTo(590, 210);
                g.quadraticCurveTo(584, 199, 572, 190);
                g.stroke();
                // 口：小さな∧
                g.beginPath();
                g.moveTo(512, 240);
                g.lineTo(499, 252);
                g.stroke();
                g.beginPath();
                g.moveTo(512, 240);
                g.lineTo(525, 252);
                g.stroke();
                const tex = new THREE.CanvasTexture(cv);
                tex.encoding = THREE.sRGBEncoding;
                tex.anisotropy = 4;
                return tex;
            }

            function buildMspn() {
                const { group, part, applyOutlines } = charBase();
                const matBody = new THREE.MeshToonMaterial({
                    color: CONFIG.bearColor,
                    gradientMap,
                });
                const matFace = new THREE.MeshToonMaterial({
                    color: CONFIG.bearColor,
                    gradientMap,
                    map: makeMspnFaceTexture(),
                });

                // 胴：卵型（下すぼまりなし・裾広がり）のスフィア。頭に深く重ねて首のくびれを作らず、
                // 頬→なで肩→腕→お尻へひと続きの寸胴シルエットにする（服なし・全身同色）
                part(new THREE.SphereGeometry(0.46, 48, 48), matBody, 0, -0.22, 0, {
                    scale: [1, 1.05, 0.95],
                });
                // 頭（顔テクスチャの正面が +z を向くよう -90° 回転。前面を広めに見せてトゥーン陰影で顔が暗く潰れないように）
                // 縦に少し長い楕円にして、頬の輪郭が（ ）のような緩いRの縦アークになるように
                // 頭頂部を平らに：スケール前のジオメトリ空間で上側の頂点を高さCAPにソフトクランプ
                // （完全な水平カットにはせず、原画の手描きの丸みを少し残す）
                const headGeo = new THREE.SphereGeometry(0.43, 48, 48);
                const headCap = 0.43 * 0.68; // 頭頂クランプ開始の高さ
                const headCapSoftness = 0.45; // クランプ後に残す丸み（0=完全平ら、1=無変化）
                const headPos = headGeo.attributes.position;
                for (let i = 0; i < headPos.count; i++) {
                    const y = headPos.getY(i);
                    if (y > headCap)
                        headPos.setY(i, headCap + (y - headCap) * headCapSoftness);
                }
                headGeo.computeVertexNormals();
                part(headGeo, matFace, 0, 0.34, 0, {
                    rot: [0, -Math.PI / 2, 0],
                    scale: [1, 1.05, 1.18],
                });
                // 耳：平らな頭頂からRの側面へ移る「角」に乗るように配置（旧：ドーム頂点付近）
                part(new THREE.SphereGeometry(0.11, 24, 24), matBody, -0.3, 0.63, 0);
                part(new THREE.SphereGeometry(0.11, 24, 24), matBody, 0.3, 0.63, 0);
                // 腕：なで肩の斜面からちょこんと出る短いカプセル（付け根を軸に回転できるようオフセット）
